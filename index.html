                {/* ── Baris 2: Jam + Durasi + Orang ── */}
                <div className="fg-row fg-3" style={{marginBottom:12,alignItems:'end'}}>
                  <div><label className="lbl">Jam Mulai</label><input className="inp" type="time" name="jamAwal" value={form.jamAwal} onChange={onChange}/></div>
                  <div><label className="lbl">Jam Akhir</label><input className="inp" type="time" name="jamAkhir" value={form.jamAkhir} onChange={onChange}/></div>
                  <div><label className="lbl" style={{color:'#b45309'}}>Jam Efektif (override)</label><input className="inp inp-num inp-amber" name="jamEfektif" value={form.jamEfektif} onChange={onChange} placeholder="0,0"/></div>
                  <div><label className="lbl" style={{color:'#6d28d9'}}>Jml Orang</label><input className="inp inp-num inp-purple" name="jumlahOrang" value={form.jumlahOrang} onChange={onChange} placeholder="0" required/></div>
                  <div className="dur-pill"><div className="dur-label">Durasi</div><div className="dur-val">{durasi().toFixed(1)}<span className="dur-unit">jam</span></div></div>
                </div>

                {/* ── Baris: Jml Box + Hasil Dus ── */}
                <div className="fg-row" style={{marginBottom:12,gridTemplateColumns:'1fr 1fr',gap:12}}>
                  <div>
                    <label className="lbl" style={{color:'#1d4ed8'}}>Jml Box</label>
                    <input className="inp inp-num inp-blue" name="jumlahBox" value={form.jumlahBox} onChange={onChange} placeholder="0"/>
                  </div>
                  <div>
                    <label className="lbl" style={{color:'#059669'}}>
                      Hasil Dus
                      {(tdsActive||nonStandarActive) && (
                        <span style={{marginLeft:5,display:'inline-flex',alignItems:'center',gap:2,padding:'1px 6px',background:'#f59e0b',color:'#fff',borderRadius:100,fontSize:'.46rem',fontWeight:900,letterSpacing:'.04em'}}>⚡ AUTO</span>
                      )}
                    </label>
                    <input className="inp inp-num inp-green" name="jumlahDus" value={form.jumlahDus} onChange={onChange} placeholder="0"/>
                  </div>
                </div>

                {/* ── Konversi Box → Dus — kotak tersendiri ── */}
                <div style={{
                  background:tdsActive?'linear-gradient(135deg,#fef3c7,#fffbeb)':'var(--surface)',
                  border:tdsActive?'1.5px solid #f59e0b':'1.5px dashed var(--border)',
                  borderRadius:12,padding:'12px 14px',marginBottom:10,
                  transition:'all .2s'
                }}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:tdsActive?10:8}}>
                    <span style={{fontSize:'.9rem'}}>📦</span>
                    <div style={{flex:1}}>
                      <div style={{fontSize:'.58rem',fontWeight:900,textTransform:'uppercase',letterSpacing:'.1em',color:tdsActive?'#b45309':'var(--muted)',lineHeight:1}}>Konversi Box → Dus</div>
                      <div style={{fontSize:'.6rem',fontWeight:500,color:tdsActive?'#92400e':'var(--subtle)',marginTop:2}}>
                        {tdsActive
                          ? `${form.jumlahBox} box × ${form.tdsPerBox} = ${dusDariTds} dus (otomatis mengisi Hasil Dus)`
                          : 'Isi nilai konversi jika ingin Hasil Dus dihitung otomatis dari Jml Box. Kosongkan jika isi manual.'}
                      </div>
                    </div>
                    {tdsActive && (
                      <button type="button" onClick={()=>setForm(p=>({...p,tdsPerBox:''}))}
                        style={{background:'none',border:'1px solid #f59e0b',borderRadius:7,padding:'3px 9px',cursor:'pointer',fontSize:'.6rem',fontWeight:800,color:'#b45309',fontFamily:'inherit',whiteSpace:'nowrap'}}>
                        Hapus
                      </button>
                    )}
                  </div>
                  <div style={{display:'flex',alignItems:'end',gap:10}}>
                    <div style={{flex:'0 0 140px'}}>
                      <label className="lbl" style={{color:tdsActive?'#b45309':'var(--muted)'}}>Nilai Konversi</label>
                      <input
                        className="inp inp-num"
                        name="tdsPerBox"
                        value={form.tdsPerBox}
                        onChange={onChange}
                        placeholder="kosong = tidak pakai"
                        style={{
                          color:tdsActive?'#78350f':'var(--inp-color)',
                          background:tdsActive?'#fffbeb':'var(--inp-bg)',
                          borderColor:tdsActive?'#f59e0b':'var(--inp-border)',
                          fontSize:tdsActive?'1.2rem':'.85rem',
                          fontWeight:tdsActive?900:600,
                        }}
                      />
                    </div>
                    {tdsActive && (
                      <div style={{display:'flex',alignItems:'center',gap:8,paddingBottom:6,flex:1}}>
                        <span style={{fontSize:'1.2rem',color:'#f59e0b',fontWeight:900}}>→</span>
                        <div style={{background:'#f59e0b',borderRadius:10,padding:'8px 16px',textAlign:'center'}}>
                          <div style={{fontSize:'.48rem',fontWeight:800,textTransform:'uppercase',letterSpacing:'.08em',color:'rgba(255,255,255,.75)',marginBottom:1}}>Hasil</div>
                          <div style={{fontSize:'1.4rem',fontWeight:900,color:'#fff',lineHeight:1}}>{dusDariTds}</div>
                          <div style={{fontSize:'.52rem',fontWeight:700,color:'rgba(255,255,255,.8)'}}>dus</div>
                        </div>
                      </div>
                    )}
                  </div>
                </div>

                {/* ── Dus Tidak Standar — kotak tersendiri ── */}
                <div style={{
                  background:nonStandarActive?'linear-gradient(135deg,#f0fdf4,#dcfce7)':'var(--surface)',
                  border:nonStandarActive?'1.5px solid #22c55e':'1.5px dashed var(--border)',
                  borderRadius:12,padding:'12px 14px',marginBottom:12,
                  transition:'all .2s'
                }}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                    <span style={{fontSize:'.9rem'}}>➕</span>
                    <div style={{flex:1}}>
                      <div style={{fontSize:'.58rem',fontWeight:900,textTransform:'uppercase',letterSpacing:'.1em',color:nonStandarActive?'#15803d':'var(--muted)',lineHeight:1}}>Dus Tidak Standar</div>
                      <div style={{fontSize:'.6rem',fontWeight:500,color:nonStandarActive?'#166534':'var(--subtle)',marginTop:2}}>
                        {nonStandarActive
                          ? `+${dusNonStandarVal} dus tidak standar ditambahkan ke Hasil Dus`
                          : 'Isi jika ada dus tidak standar yang perlu ditambahkan ke Hasil Dus.'}
                      </div>
                    </div>
                    {nonStandarActive && (
                      <div style={{background:'#22c55e',borderRadius:9,padding:'5px 12px',textAlign:'center',flexShrink:0}}>
                        <div style={{fontSize:'.46rem',fontWeight:800,textTransform:'uppercase',color:'rgba(255,255,255,.8)',marginBottom:1}}>+Tambahan</div>
                        <div style={{fontSize:'1.15rem',fontWeight:900,color:'#fff',lineHeight:1}}>{dusNonStandarVal} <span style={{fontSize:'.6rem',fontWeight:700}}>dus</span></div>
                      </div>
                    )}
                  </div>
                  <div style={{display:'flex',alignItems:'end',gap:10}}>
                    <div style={{flex:'0 0 160px'}}>
                      <label className="lbl" style={{color:nonStandarActive?'#15803d':'var(--muted)'}}>Jml Dus Tidak Standar</label>
                      <input
                        className="inp inp-num"
                        name="dusNonStandar"
                        value={form.dusNonStandar}
                        onChange={onChange}
                        placeholder="kosong = tidak ada"
                        style={{
                          color:nonStandarActive?'#14532d':'var(--inp-color)',
                          background:nonStandarActive?'#f0fdf4':'var(--inp-bg)',
                          borderColor:nonStandarActive?'#22c55e':'var(--inp-border)',
                          fontSize:nonStandarActive?'1.2rem':'.85rem',
                          fontWeight:nonStandarActive?900:600,
                        }}
                      />
                    </div>
                    {nonStandarActive && (tdsActive || parseInt(form.jumlahDus)>0) && (
                      <div style={{paddingBottom:6,fontSize:'.68rem',fontWeight:600,color:'#15803d',display:'flex',alignItems:'center',gap:5,flex:1}}>
                        <span style={{fontSize:'1rem'}}>🧮</span>
                        <span>
                          {tdsActive ? `${dusDariTds} (TDS)` : `${parseInt(form.jumlahDus)||0} (manual)`}
                          {' '}+{' '}{dusNonStandarVal}{' '}
                          = <strong style={{color:'#14532d',fontSize:'.8rem'}}>{totalDusAuto} dus</strong>
                        </span>
                      </div>
                    )}
                  </div>
                </div>

                {/* ── Baris: Harga Jam + Harga Dus ── */}
                <div className="fg-row" style={{marginBottom:12,gridTemplateColumns:'1fr 1fr',gap:12}}>
                  <div><label className="lbl" style={{color:'#1d4ed8'}}>Rp / Jam (flat)</label><input className="inp inp-num inp-blue" name="hargaPerJam" value={form.hargaPerJam} onChange={onChange} placeholder="0"/></div>
                  <div><label className="lbl" style={{color:'#059669'}}>Rp / Dus (bagi)</label><input className="inp inp-num inp-green" name="hargaPerDus" value={form.hargaPerDus} onChange={onChange} placeholder="0"/></div>
                </div>

                <div style={{marginBottom:12}}>
                  <label className="lbl">Catatan (opsional)</label>
                  <input className="inp" name="catatan" value={form.catatan} onChange={onChange} placeholder="Tambahan info..." style={{fontSize:'.875rem'}}/>
                </div>

                {form.daftarPegawai.length>0&&(
                  <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:12,padding:14,marginBottom:14}}>
                    <div className="card-title" style={{marginBottom:10}}><Ic n="users" s={13}/> Nama Pegawai ({form.daftarPegawai.length})</div>
                    <div className="pegawai-grid">
                      {form.daftarPegawai.map((n,i)=>(
                        <div key={i} className="peg-wrap">
                          <span className="peg-num">{i+1}</span>
                          <PegawaiInput value={n} onChange={v=>onPeg(i,v)} placeholder={`Pegawai ${i+1}`} allNames={allNames}/>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                <div className="calc-bar">
                  <div>
                    <div className="calc-est">Estimasi Upah Per Orang</div>
                    <div className="calc-amount">{fRp(live.perOrang)}</div>
                    <div className="calc-breakdown">
                      <span className="calc-item">Jam: <strong style={{color:'#60a5fa'}}>{fRp(live.jamPerOrang)}</strong></span>
                      <span className="calc-item">Dus: <strong style={{color:'#34d399'}}>{fRp(live.dusPerOrang)}</strong></span>
                      <span className="calc-item">Total: <strong style={{color:'#fbbf24'}}>{fRp(live.total)}</strong></span>
                    </div>
                  </div>
                  <button type="submit" disabled={loading} className="btn btn-primary btn-full" style={{maxWidth:'none',background:editItem?'#d97706':undefined}}>
                    {loading?<><Spin s={15}/> {editItem?'Mengupdate...':'Menyimpan...'}</>:<><Ic n="save" s={15}/> {editItem?'Update Batch':'Simpan Batch'}</>}
                  </button>
                </div>
              </form>
            </div>
          </div>
        )}

        {/* ═══ TAB: LOG ═══ */}
        {tab==='log'&&(
          <div className="card">
            <div className="card-head">
              <div className="card-title"><Ic n="list" s={14}/> Log Produksi <span className="badge badge-blue">{filtHist.length}</span>
                {activeFilters>0&&<span className="badge badge-amber">{activeFilters} filter aktif</span>}
              </div>
              {history.length>0&&<button className="btn btn-danger btn-sm" onClick={()=>setShowConfirmClear(true)}><Ic n="trash" s={12}/> Hapus Semua</button>}
            </div>
            <div className="table-wrap">
              <table>
                <thead><tr><th>Batch & Produk</th><th>Waktu</th><th className="text-right">Upah / Orang</th><th>Anggota</th><th style={{textAlign:'center'}}>Aksi</th></tr></thead>
                <tbody>
                  {filtHist.length===0?<tr><td colSpan="5" className="empty">{history.length===0?'Belum ada data. Mulai input batch!':'Tidak ada hasil.'}</td></tr>
                  :filtHist.map(item=>(
                    <React.Fragment key={item.id}>
                      <tr className={expandedId===item.id?'expanded':''} onClick={()=>setExpandedId(expandedId===item.id?null:item.id)}>
                        <td>
                          <div style={{fontWeight:800,fontSize:'.86rem',color:'var(--ink)',textTransform:'uppercase',marginBottom:2}}>{item.namaBarang}</div>
                          <div style={{display:'flex',alignItems:'center',gap:5,flexWrap:'wrap',marginBottom:5}}>
                            <span className="badge badge-slate">#{item.nomorBatch}</span>
                            <span style={{fontSize:'.66rem',color:'var(--muted)',fontWeight:600}}>{item.tanggal}</span>
                          </div>
                          <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                            <span className="badge badge-slate"><Ic n="box" s={8}/> {item.jumlahBox||0} Box</span>
                            <span className="badge badge-green"><Ic n="box" s={8}/> {item.jumlahDus||0} Dus</span>
                            {item.tdsPerBox&&<span className="badge badge-amber">Konversi {item.tdsPerBox}</span>}
                            {item.dusNonStandar&&<span className="badge badge-green">+{item.dusNonStandar} Non-std</span>}
                          </div>
                        </td>
                        <td style={{whiteSpace:'nowrap'}}>
                          <div style={{fontSize:'.73rem',fontWeight:700,color:'var(--muted)'}}>{item.jamAwal||'--:--'} – {item.jamAkhir||'--:--'}</div>
                          <div style={{fontSize:'.78rem',fontWeight:800,color:'#0369a1',marginTop:2,display:'flex',alignItems:'center',gap:3}}><Ic n="clock" s={10}/>{(item.durasi||0).toFixed(1)} jam</div>
                        </td>
                        <td className="text-right" style={{whiteSpace:'nowrap'}}>
                          <div style={{fontSize:'.95rem',fontWeight:900,color:'var(--ink)'}}>{fRp(item.perOrang)}</div>
                          <div style={{fontSize:'.6rem',color:'var(--subtle)',marginTop:1}}>
                            <span style={{color:'#3b82f6'}}>J:{fRp(item.jamPerOrang)}</span> <span style={{color:'#059669'}}>D:{fRp(item.dusPerOrang)}</span>
                          </div>
                        </td>
                        <td>
                          <div style={{display:'flex',flexWrap:'wrap',gap:3,maxWidth:200}}>
                            {(item.listPegawai||[]).slice(0,4).map((p,i)=><span key={i} className={`badge ${search&&p.toLowerCase().includes(search.toLowerCase())?'badge-hit':'badge-slate'}`}>{p}</span>)}
                            {item.listPegawai.length>4&&<span className="badge badge-amber">+{item.listPegawai.length-4}</span>}
                          </div>
                        </td>
                        <td style={{textAlign:'center'}}>
                          <div style={{display:'flex',gap:3,justifyContent:'center'}}>
                            <button type="button" className="btn btn-sm" style={{padding:'5px 10px',background:'#d97706',color:'#fff',borderRadius:8,fontWeight:800,fontSize:'.68rem',display:'flex',alignItems:'center',gap:4}} onClick={e=>openEditLog(item,e)} title="Edit Batch"><Ic n="save" s={12}/> Edit</button>
                            <button type="button" className="btn btn-danger btn-sm" style={{padding:'5px 7px'}} onClick={e=>{e.stopPropagation();setConfirmDeleteId(item.id);}} title="Hapus"><Ic n="trash" s={12}/></button>
                          </div>
                        </td>
                      </tr>
                      {/* ── INLINE EDIT PANEL ── */}
                      {editLogId===item.id&&editLogForm&&(
                        <tr className="expand-row"><td colSpan="5">
                          <div style={{padding:'16px 18px',background:'var(--surface)',borderBottom:'2px solid #d97706',borderLeft:'3px solid #d97706'}}>
                            {/* Header */}
                            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
                              <div style={{width:32,height:32,background:'#fef3c7',borderRadius:9,display:'flex',alignItems:'center',justifyContent:'center',color:'#d97706',flexShrink:0}}><Ic n="save" s={15}/></div>
                              <div style={{flex:1}}>
                                <div style={{fontWeight:900,fontSize:'.82rem',color:'#d97706'}}>Edit Batch #{editLogForm.nomorBatch}</div>
                                <div style={{fontSize:'.62rem',color:'var(--muted)',fontWeight:500}}>Ubah data batch ini langsung dari log</div>
                              </div>
                              <button type="button" className="btn btn-ghost btn-sm" style={{padding:'4px 8px'}} onClick={()=>{setEditLogId(null);setEditLogForm(null);}}><Ic n="x" s={13}/> Batal</button>
                            </div>

                            {/* Baris 1: Nama Barang + No Batch + Tanggal */}
                            <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr',gap:10,marginBottom:10}}>
                              <div><label className="lbl">Nama Barang</label><input className="inp" name="namaBarang" value={editLogForm.namaBarang} onChange={onEditLogChange} style={{fontWeight:700}} required/></div>
                              <div><label className="lbl">No. Batch</label><input className="inp" name="nomorBatch" value={editLogForm.nomorBatch} onChange={onEditLogChange} style={{fontWeight:800,textAlign:'center'}} required/></div>
                              <div><label className="lbl">Tanggal</label><input className="inp" type="date" name="tanggal" value={editLogForm.tanggal} onChange={onEditLogChange} required/></div>
                            </div>

                            {/* Baris 2: Jam + Durasi + Orang */}
                            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr auto',gap:10,marginBottom:10,alignItems:'end'}}>
                              <div><label className="lbl">Jam Mulai</label><input className="inp" type="time" name="jamAwal" value={editLogForm.jamAwal||''} onChange={onEditLogChange}/></div>
                              <div><label className="lbl">Jam Akhir</label><input className="inp" type="time" name="jamAkhir" value={editLogForm.jamAkhir||''} onChange={onEditLogChange}/></div>
                              <div><label className="lbl" style={{color:'#b45309'}}>Jam Efektif</label><input className="inp inp-num inp-amber" name="jamEfektif" value={editLogForm.jamEfektif||''} onChange={onEditLogChange} placeholder="0,0"/></div>
                              <div><label className="lbl" style={{color:'#6d28d9'}}>Jml Orang</label><input className="inp inp-num inp-purple" name="jumlahOrang" value={editLogForm.jumlahOrang||''} onChange={onEditLogChange} placeholder="0"/></div>
                              <div className="dur-pill">
                                <div className="dur-label">Durasi</div>
                                <div className="dur-val">{(()=>{const f=editLogForm;if(f.jamEfektif)return toF(f.jamEfektif).toFixed(1);if(!f.jamAwal||!f.jamAkhir)return'0.0';const a=new Date(`2000-01-01T${f.jamAwal}`),b=new Date(`2000-01-01T${f.jamAkhir}`);let d=(b-a)/3600000;if(d<0)d+=24;return d.toFixed(1);})()}<span className="dur-unit">jam</span></div>
                              </div>
                            </div>

                            {/* Baris 3: Box + Hasil Dus */}
                            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
                              <div><label className="lbl" style={{color:'#1d4ed8'}}>Jml Box</label><input className="inp inp-num inp-blue" name="jumlahBox" value={editLogForm.jumlahBox||''} onChange={onEditLogChange} placeholder="0"/></div>
                              <div>
                                <label className="lbl" style={{color:'#059669'}}>
                                  Hasil Dus
                                  {((parseInt(editLogForm.tdsPerBox)||0)>0||(parseInt(editLogForm.dusNonStandar)||0)>0)&&<span style={{marginLeft:4,padding:'1px 5px',background:'#f59e0b',color:'#fff',borderRadius:100,fontSize:'.44rem',fontWeight:900}}>⚡AUTO</span>}
                                </label>
                                <input className="inp inp-num inp-green" name="jumlahDus" value={editLogForm.jumlahDus||''} onChange={onEditLogChange} placeholder="0"/>
                              </div>
                            </div>

                            {/* Konversi Box → Dus */}
                            <div style={{background:(parseInt(editLogForm.tdsPerBox)||0)>0?'#fffbeb':'var(--surface)',border:(parseInt(editLogForm.tdsPerBox)||0)>0?'1.5px solid #f59e0b':'1.5px dashed var(--border)',borderRadius:10,padding:'10px 12px',marginBottom:8,transition:'all .2s'}}>
                              <div style={{fontSize:'.56rem',fontWeight:900,textTransform:'uppercase',letterSpacing:'.1em',color:(parseInt(editLogForm.tdsPerBox)||0)>0?'#b45309':'var(--muted)',marginBottom:7}}>📦 Konversi Box → Dus</div>
                              <div style={{display:'flex',alignItems:'end',gap:10}}>
                                <div style={{flex:'0 0 130px'}}><label className="lbl" style={{color:(parseInt(editLogForm.tdsPerBox)||0)>0?'#b45309':'var(--muted)'}}>Nilai Konversi</label><input className="inp inp-num" name="tdsPerBox" value={editLogForm.tdsPerBox||''} onChange={onEditLogChange} placeholder="kosong = tidak pakai" style={{fontSize:(parseInt(editLogForm.tdsPerBox)||0)>0?'1.1rem':'.82rem',fontWeight:(parseInt(editLogForm.tdsPerBox)||0)>0?900:600,color:(parseInt(editLogForm.tdsPerBox)||0)>0?'#78350f':'var(--inp-color)',background:(parseInt(editLogForm.tdsPerBox)||0)>0?'#fffbeb':'var(--inp-bg)',borderColor:(parseInt(editLogForm.tdsPerBox)||0)>0?'#f59e0b':'var(--inp-border)'}}/></div>
                                {(parseInt(editLogForm.tdsPerBox)||0)>0&&(parseInt(editLogForm.jumlahBox)||0)>0&&(
                                  <div style={{paddingBottom:4,fontSize:'.7rem',fontWeight:700,color:'#b45309'}}>
                                    {editLogForm.jumlahBox} × {editLogForm.tdsPerBox} = <strong style={{color:'#78350f'}}>{(parseInt(editLogForm.jumlahBox)||0)*(parseInt(editLogForm.tdsPerBox)||0)} dus</strong>
                                  </div>
                                )}
                              </div>
                            </div>

                            {/* Dus Tidak Standar */}
                            <div style={{background:(parseInt(editLogForm.dusNonStandar)||0)>0?'#f0fdf4':'var(--surface)',border:(parseInt(editLogForm.dusNonStandar)||0)>0?'1.5px solid #22c55e':'1.5px dashed var(--border)',borderRadius:10,padding:'10px 12px',marginBottom:10,transition:'all .2s'}}>
                              <div style={{fontSize:'.56rem',fontWeight:900,textTransform:'uppercase',letterSpacing:'.1em',color:(parseInt(editLogForm.dusNonStandar)||0)>0?'#15803d':'var(--muted)',marginBottom:7}}>➕ Dus Tidak Standar</div>
                              <div style={{flex:'0 0 130px'}}><label className="lbl" style={{color:(parseInt(editLogForm.dusNonStandar)||0)>0?'#15803d':'var(--muted)'}}>Jml Dus Tidak Standar</label><input className="inp inp-num" name="dusNonStandar" value={editLogForm.dusNonStandar||''} onChange={onEditLogChange} placeholder="kosong = tidak ada" style={{fontSize:(parseInt(editLogForm.dusNonStandar)||0)>0?'1.1rem':'.82rem',fontWeight:(parseInt(editLogForm.dusNonStandar)||0)>0?900:600,color:(parseInt(editLogForm.dusNonStandar)||0)>0?'#14532d':'var(--inp-color)',background:(parseInt(editLogForm.dusNonStandar)||0)>0?'#f0fdf4':'var(--inp-bg)',borderColor:(parseInt(editLogForm.dusNonStandar)||0)>0?'#22c55e':'var(--inp-border)'}}/></div>
                            </div>

                            {/* Harga */}
                            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>

                              </div>

                              <label className="lbl">Catatan</label>

                            {(()=>{const u=calcFor(editLogForm);return(

                                    <div style={{color:'rgba(255,255,255,.4)',fontSize:'.52rem',fontWeight:800,textTransform:'uppercase',letterSpacing:'.1em',marginBottom:2}}>Preview Upah / Orang</div>

                                      <span style={{fontSize:'.6rem',color:'rgba(255,255,255,.4)'}}>Jam: <strong style={{color:'#60a5fa'}}>{fRp(u.jamPerOrang)}</strong></span>
                                      <span style={{fontSize:'.6rem',color:'rgba(255,255,255,.4)'}}>Dus: <strong style={{color:'#34d399'}}>{fRp(u.dusPerOrang)}</strong></span>
                                      <span style={{fontSize:'.6rem',color:'rgba(255,255,255,.4)'}}>Total: <strong style={{color:'#fbbf24'}}>{fRp(u.total)}</strong></span>
                                    </div>
                                  </div>
                                  <button type="button" className="btn btn-primary" style={{background:'#d97706',padding:'11px 24px',fontSize:'.8rem'}} onClick={saveEditLog}>
                                    <Ic n="save" s={15}/> Simpan Perubahan
                                  </button>
                                </div>
                              </div>

                              <div className="exp-box">
                                <div className="exp-lbl">Detail Upah</div>
                                <div className="exp-row"><span>Harga/Jam:</span> Rp {toF(item.hargaPerJam).toLocaleString('id-ID')}</div>
                                <div className="exp-row"><span>Harga/Dus:</span> Rp {toF(item.hargaPerDus).toLocaleString('id-ID')}</div>

                                <div className="exp-row"><span>Jml Orang:</span> {item.jumlahOrang||0}</div>
                                <div className="exp-row"><span>Jml Box:</span> {item.jumlahBox||0}</div>

                                {item.tdsPerBox&&<div className="exp-row"><span>Konversi Box→Dus:</span> {item.tdsPerBox}</div>}
                                {item.dusNonStandar&&<div className="exp-row"><span>Dus Tidak Standar:</span> +{item.dusNonStandar}</div>}

                              <div className="exp-box">
                                <div className="exp-lbl">Semua Anggota ({(item.listPegawai||[]).length})</div>

                                <div className="exp-lbl">Catatan</div>

                            </div>
                          </div>

                <div className="top-amount"><div className="top-amount-lbl">Total Gaji</div><div className="top-amount-val">{fRp(akumulasi[0].totalSemua)}</div></div>
              </div>

                return(
                  <div key={i} className={`peg-card ${isActive?'active':''}`}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                      <div><div className="peg-name">{p.nama}</div><div className="peg-meta">{i===0&&!search?'👑 ':''}{p.batchCount} batch · #{i+1}</div></div>

                      <div className="peg-stat"><div className="peg-stat-lbl" style={{color:'#6ee7b7'}}>Upah Dus</div><div className="peg-stat-val" style={{color:'#34d399'}}>{fRp(p.totalDus)}</div></div>

                    <div className="progress"><div className="progress-fill" style={{width:`${pct}%`}}/></div>
                    <div className="peg-total-row"><span className="peg-total-lbl">Total Gaji</span><span className="peg-total-val">{fRp(p.totalSemua)}</span></div>

                      📄 Lihat Slip Gaji
                    </button>
                  </div>

              })}
            </div>
          </div>

                <div style={{flex:1}}>

                {/* Rows */}
                {katalog
                  .map((p,realIdx)=>({p,realIdx}))
                  .filter(({p})=>!katalogSearch.trim()||p.nama.toLowerCase().includes(katalogSearch.trim().toLowerCase()))

                    const hargaNum = typeof p.harga==='number' ? p.harga : parseFloat(String(p.harga).replace(',','.')) || 0;
                    return (
                      <React.Fragment key={realIdx}>
                        <div style={{padding:'10px 14px',fontSize:'.77rem',fontWeight:600,borderBottom:i<arr.length-1?'1px solid var(--border)':'none',display:'flex',alignItems:'center',gap:7}}>

                        </div>
                        <div style={{padding:'10px 14px',fontSize:'.77rem',fontWeight:800,color:'#059669',borderBottom:i<arr.length-1?'1px solid var(--border)':'none',textAlign:'right',whiteSpace:'nowrap'}}>
                          Rp {hargaNum.toLocaleString('id-ID',{minimumFractionDigits:2,maximumFractionDigits:2})}
                        </div>
                        <div style={{padding:'10px 8px',borderBottom:i<arr.length-1?'1px solid var(--border)':'none',display:'flex',alignItems:'center',justifyContent:'center',gap:4}}>

                            onClick={()=>setEditProduk({idx:realIdx, nama:p.nama, harga:hargaNum.toFixed(2).replace('.',',')})}>
                            <Ic n="edit" s={13}/>
                          </button>
                          <button className="btn btn-ghost btn-sm" style={{padding:'5px 7px',color:'#ef4444'}} title="Hapus"
                            onClick={()=>{
                              if(confirm(`Hapus produk "${p.nama}"?`)){
                                setKatalog(prev=>prev.filter((_,j)=>j!==realIdx));
                                toast(`Produk "${p.nama}" dihapus`,'success');
                              }
                            }}>
                            <Ic n="trash" s={13}/>
                          </button>
                        </div>
                      </React.Fragment>
                    );
                  })
                }
                {katalog.filter(p=>!katalogSearch.trim()||p.nama.toLowerCase().includes(katalogSearch.trim().toLowerCase())).length===0&&(
                  <div style={{gridColumn:'1/-1',padding:'24px',textAlign:'center',color:'var(--subtle)',fontSize:'.78rem'}}>
                    {katalogSearch.trim() ? `Produk "${katalogSearch}" tidak ditemukan.` : 'Katalog kosong. Tambahkan produk baru.'}
                  </div>
                )}
              </div>
            </div>

            {/* Reset ke default */}
            <div style={{marginTop:12,textAlign:'center'}}>

                <Ic n="sync" s={11}/> Reset ke Katalog Default
              </button>
            </div>

            {editProduk&&(

                    <div style={{width:36,height:36,background:'linear-gradient(135deg,#3b82f6,#6366f1)',borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',flexShrink:0}}><Ic n="edit" s={17}/></div>

                    <input className="inp" value={editProduk.nama} onChange={e=>setEditProduk(p=>({...p,nama:e.target.value}))} placeholder="Nama produk..."/>

                  <div style={{marginBottom:20}}>
                    <label className="lbl">Harga per Dus (Rp)</label>

                      <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',fontSize:'.72rem',fontWeight:700,color:'var(--subtle)'}}>Rp</span>
                      <input className="inp" value={editProduk.harga} onChange={e=>setEditProduk(p=>({...p,harga:cleanN(e.target.value)}))} placeholder="0,00" style={{paddingLeft:30,fontWeight:800,fontSize:'1rem',color:'#059669'}}/>
                    </div>
                  </div>
                  <div style={{display:'flex',gap:8}}>
                    <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setEditProduk(null)}>Batal</button>
                    <button className="btn btn-primary" style={{flex:2}} onClick={()=>{
                      if(!editProduk.nama.trim()){toast('Nama produk tidak boleh kosong','error');return;}
                      const h=toF(editProduk.harga);
                      if(!h){toast('Harga tidak valid','error');return;}
                      setKatalog(prev=>prev.map((p,i)=>i===editProduk.idx?{nama:editProduk.nama.trim(),harga:h}:p));
                      toast(`"${editProduk.nama.trim()}" berhasil diperbarui`,'success');
                      setEditProduk(null);
                    }}><Ic n="save" s={14}/> Simpan</button>
                  </div>
                </div>
              </div>
            )}

            {/* Modal Tambah Produk */}
            {showAddProduk&&(
              <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)setShowAddProduk(false);}}>
                <div className="modal" style={{maxWidth:380,padding:'22px 24px'}}>
                  <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:18}}>
                    <div style={{width:36,height:36,background:'linear-gradient(135deg,#059669,#0ea5e9)',borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',flexShrink:0}}><Ic n="plus" s={17}/></div>
                    <div style={{flex:1}}><h2 style={{margin:0,fontSize:'.9rem',fontWeight:900,textAlign:'left'}}>Tambah Produk Baru</h2><div style={{fontSize:'.63rem',color:'var(--subtle)'}}>Akan muncul di dropdown saat input batch</div></div>
                    <button className="btn btn-ghost btn-sm" style={{padding:'5px'}} onClick={()=>setShowAddProduk(false)}><Ic n="x" s={15}/></button>
                  </div>
                  <div style={{marginBottom:14}}>
                    <label className="lbl">Nama Produk</label>
                    <input className="inp" value={addProdukForm.nama} onChange={e=>setAddProdukForm(p=>({...p,nama:e.target.value}))} placeholder="Nama produk baru..."/>
                  </div>
                  <div style={{marginBottom:20}}>
                    <label className="lbl">Harga per Dus (Rp)</label>
                    <div style={{position:'relative'}}>
                      <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',fontSize:'.72rem',fontWeight:700,color:'var(--subtle)'}}>Rp</span>
                      <input className="inp" value={addProdukForm.harga} onChange={e=>setAddProdukForm(p=>({...p,harga:cleanN(e.target.value)}))} placeholder="0,00" style={{paddingLeft:30,fontWeight:800,fontSize:'1rem',color:'#059669'}}/>
                    </div>
                  </div>
                  <div style={{display:'flex',gap:8}}>
                    <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setShowAddProduk(false)}>Batal</button>
                    <button className="btn btn-primary" style={{flex:2,background:'#059669'}} onClick={()=>{
                      if(!addProdukForm.nama.trim()){toast('Nama produk tidak boleh kosong','error');return;}
                      const h=toF(addProdukForm.harga);
                      if(!h){toast('Harga tidak valid','error');return;}
                      const duplikat=katalog.some(p=>p.nama.toLowerCase()===addProdukForm.nama.trim().toLowerCase());
                      if(duplikat){toast('Produk dengan nama ini sudah ada','error');return;}
                      setKatalog(prev=>[...prev,{nama:addProdukForm.nama.trim(),harga:h}].sort((a,b)=>a.nama.localeCompare(b.nama)));
                      toast(`"${addProdukForm.nama.trim()}" ditambahkan ke katalog`,'success');
                      setShowAddProduk(false);
                      setAddProdukForm({nama:'',harga:''});
                    }}><Ic n="plus" s={14}/> Tambah</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        )}

        {/* ═══ TAB: CHART ═══ */}
        {tab==='chart'&&(
          <div>
            {history.length===0?(
              <div className="card"><div className="empty">Belum ada data untuk grafik.</div></div>
            ):(
              <>
                <div className="chart-grid">
                  <div className="chart-box">
                    <div className="chart-title"><Ic n="chart" s={13}/> Total Gaji per Bulan</div>
                    <div className="chart-wrap">{chartBulanan.length>0?<ChartBar data={chartBulanan} color="#2563eb"/>:<div className="empty" style={{padding:'24px 0'}}>Belum cukup data</div>}</div>
                  </div>
                  <div className="chart-box">
                    <div className="chart-title"><Ic n="users" s={13}/> Distribusi Gaji Top 6</div>
                    <div className="chart-wrap">{chartPegawai.length>0?<ChartDoughnut data={chartPegawai}/>:<div className="empty" style={{padding:'24px 0'}}>Belum ada data</div>}</div>
                  </div>
                </div>
                <div className="chart-grid">
                  <div className="chart-box">
                    <div className="chart-title"><Ic n="award" s={13}/> Ranking Upah Pegawai</div>
                    <div className="chart-wrap"><ChartBar data={akumulasi.slice(0,8).map(p=>({label:p.nama.slice(0,10),val:p.totalSemua}))} color="#059669"/></div>
                  </div>
                  <div className="chart-box">
                    <div className="chart-title"><Ic n="box" s={13}/> Statistik Ringkas</div>

                        {l:'Total Batch',v:stats.totalBatch,c:'#2563eb',icon:'📋'},
                        {l:'Total Pegawai',v:stats.totalPegawai,c:'#059669',icon:'👥'},
                        {l:'Total Gaji',v:fRp(stats.totalGaji),c:'#f59e0b',icon:'💰'},
                        {l:'Avg/Orang',v:fRp(stats.avgPerOrang),c:'#e11d48',icon:'📊'},
                        {l:'Avg/Batch',v:fRp(history.length>0?stats.totalGaji/history.length:0),c:'#7c3aed',icon:'⚡'},
                        {l:'Max Upah',v:fRp(akumulasi[0]?.totalSemua||0),c:'#0891b2',icon:'🏆'},
                      ].map((s,i)=>(
                        <div key={i} style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:10,padding:'11px 12px'}}>
                          <div style={{fontSize:'1rem',marginBottom:3}}>{s.icon}</div>
                          <div style={{fontSize:'.55rem',fontWeight:800,textTransform:'uppercase',letterSpacing:'.08em',color:'var(--muted)',marginBottom:2}}>{s.l}</div>
                          <div style={{fontSize:'.9rem',fontWeight:900,color:s.c}}>{s.v}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              </>
            )}
          </div>

            <button className="btn btn-ghost btn-sm" style={{color:'rgba(255,255,255,.4)',borderColor:'rgba(255,255,255,.12)',fontSize:'.6rem',padding:'4px 8px',flexShrink:0}} onClick={()=>setShowChangelog(true)}>v8 📋</button>

      {/* CHANGELOG MODAL */}
      {showChangelog&&(
        <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)setShowChangelog(false);}}>
          <div className="modal" style={{maxWidth:420,maxHeight:'85vh',overflowY:'auto',padding:'22px 24px'}}>

              <div style={{flex:1}}><h2 style={{fontSize:'.92rem',fontWeight:900,margin:0,textAlign:'left'}}>Changelog v8</h2></div>
              <button className="btn btn-ghost btn-sm" style={{padding:'5px'}} onClick={()=>setShowChangelog(false)}><Ic n="x" s={15}/></button>
            </div>
            <div style={{background:'#eff6ff',border:'1px solid #bfdbfe',borderRadius:12,padding:'12px 14px'}}>
              {[
                {icon:'📄',t:'Slip Gaji Per Orang (BARU!)',d:'Klik "Lihat Slip Gaji" di tab Pegawai untuk cetak/simpan slip gaji per karyawan. Filter per bulan, tampilkan detail semua batch, dan tombol cetak/PDF.'},
                {icon:'🖨️',t:'Cetak & Simpan PDF',d:'Slip gaji bisa dicetak langsung dari browser atau disimpan sebagai PDF. Tersedia di tab Pegawai (tiap kartu) dan di log detail batch.'},
                {icon:'📱',t:'Optimasi Android & iOS',d:'Safe area support untuk notch/home indicator, tap highlight dihapus, font-size diperbesar agar tidak auto-zoom, dan bottom sheet modal di layar kecil.'},
                {icon:'📦',t:'Kalkulator Box → Dus',d:'Input Jml Box + TDS/Box otomatis mengisi Hasil Dus. Badge "Auto" muncul saat mode TDS aktif.'},
              ].map((item,i,arr)=>(
                <div key={i} style={{display:'flex',gap:9,paddingBottom:10,marginBottom:10,borderBottom:i<arr.length-1?'1px solid rgba(37,99,235,.1)':'none'}}>
                  <span style={{fontSize:'1rem',flexShrink:0}}>{item.icon}</span>
                  <div><div style={{fontSize:'.76rem',fontWeight:800,color:'#1d4ed8',marginBottom:2}}>{item.t}</div><div style={{fontSize:'.73rem',fontWeight:500,color:'var(--ink)',lineHeight:1.55}}>{item.d}</div></div>
                </div>
              ))}

  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

(function(){
  const orig = EventTarget.prototype.addEventListener;
  // Only patch wheel and touchstart/move for passive
  ['touchstart','touchmove','wheel'].forEach(type => {

  });

<script>
/* ═══════════════════════════════════════
   SERVICE WORKER — offline cache
═══════════════════════════════════════ */
if ('serviceWorker' in navigator) {
  const SW_CODE = `
const CACHE = 'upah-borongan-v1';
const ASSETS = [
  'https://unpkg.com/react@18/umd/react.production.min.js',
  'https://unpkg.com/react-dom@18/umd/react-dom.production.min.js',
  'https://unpkg.com/@babel/standalone/babel.min.js',
  'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js',
  'https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js',
  'https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap',
];
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS).catch(()=>{})));
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys =>
    Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))
  ));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  e.respondWith(
    caches.match(e.request).then(cached => {
      if (cached) return cached;
      return fetch(e.request).then(resp => {
        if (!resp || resp.status !== 200 || resp.type === 'opaque') return resp;
        const clone = resp.clone();
        caches.open(CACHE).then(c => c.put(e.request, clone));
        return resp;
      }).catch(() => cached);
    })
  );
});
`;
  const swBlob = new Blob([SW_CODE], {type:'application/javascript'});
  const swUrl  = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl, {scope: '/'}).catch(()=>{});
}

/* ═══════════════════════════════════════
   PWA INSTALL PROMPT BANNER
═══════════════════════════════════════ */
(function(){
  let deferredPrompt = null;
  const DISMISSED_KEY = 'pwa_install_dismissed';

  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    if (localStorage.getItem(DISMISSED_KEY)) return;
    showBanner();
  });

  function showBanner() {
    if (document.getElementById('pwa-banner')) return;

    const banner = document.createElement('div');
    banner.id = 'pwa-banner';
    banner.innerHTML = `
      <div style="
        position:fixed;bottom:130px;left:12px;right:12px;z-index:9999;
        background:linear-gradient(135deg,#1e3a8a,#1d4ed8);
        border:1px solid rgba(96,165,250,.35);
        border-radius:16px;padding:14px 16px;
        box-shadow:0 8px 32px rgba(0,0,0,.45);
        display:flex;align-items:center;gap:12px;
        animation:slideUp .3s ease;
        font-family:'Plus Jakarta Sans',system-ui,sans-serif;
      ">
        <style>@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}</style>
        <div style="width:44px;height:44px;background:rgba(255,255,255,.12);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.4rem">🧮</div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:900;font-size:.88rem;color:#fff;margin-bottom:2px">Install Upah Borongan</div>
          <div style="font-size:.7rem;color:rgba(255,255,255,.65);font-weight:500">Tambahkan ke layar utama untuk akses cepat & offline</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0">
          <button id="pwa-install-btn" style="
            background:#fff;color:#1d4ed8;border:none;border-radius:9px;
            padding:7px 14px;font-family:inherit;font-weight:900;font-size:.72rem;
            cursor:pointer;white-space:nowrap;
          ">⬇ Install</button>
          <button id="pwa-dismiss-btn" style="
            background:rgba(255,255,255,.12);color:rgba(255,255,255,.7);border:none;border-radius:9px;
            padding:5px 14px;font-family:inherit;font-weight:700;font-size:.65rem;
            cursor:pointer;
          ">Nanti</button>
        </div>
      </div>`;
    document.body.appendChild(banner);

    document.getElementById('pwa-install-btn').onclick = async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
      banner.remove();
      if (outcome === 'accepted') {
        // Show success toast
        const t = document.createElement('div');
        t.style.cssText = 'position:fixed;top:16px;right:16px;z-index:9999;background:#059669;color:#fff;padding:10px 16px;border-radius:12px;font-family:inherit;font-weight:700;font-size:.8rem;box-shadow:0 4px 20px rgba(0,0,0,.3)';
        t.textContent = '✓ Berhasil diinstall!';
        document.body.appendChild(t);
        setTimeout(()=>t.remove(), 3500);
      }
    };
    document.getElementById('pwa-dismiss-btn').onclick = () => {
      localStorage.setItem(DISMISSED_KEY, '1');
      banner.remove();
    };
  }

  // Untuk iOS Safari — tampilkan panduan manual
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isInStandalone = ('standalone' in navigator && navigator.standalone) ||
                         window.matchMedia('(display-mode: standalone)').matches;
  if (isIOS && !isInStandalone && !localStorage.getItem(DISMISSED_KEY)) {
    setTimeout(() => {
      const banner = document.createElement('div');
      banner.id = 'pwa-banner';
      banner.innerHTML = `
        <div style="
          position:fixed;bottom:130px;left:12px;right:12px;z-index:9999;
          background:linear-gradient(135deg,#1e3a8a,#1d4ed8);
          border:1px solid rgba(96,165,250,.35);
          border-radius:16px;padding:14px 16px;
          box-shadow:0 8px 32px rgba(0,0,0,.45);
          font-family:'Plus Jakarta Sans',system-ui,sans-serif;
          animation:slideUp .3s ease;
        ">
          <style>@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}</style>
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
            <span style="font-size:1.3rem">📲</span>
            <div style="font-weight:900;font-size:.88rem;color:#fff">Install ke Layar Utama</div>
            <button id="ios-dismiss" style="margin-left:auto;background:none;border:none;color:rgba(255,255,255,.6);font-size:1.1rem;cursor:pointer;padding:2px">✕</button>
          </div>
          <div style="font-size:.75rem;color:rgba(255,255,255,.8);line-height:1.6;font-weight:500">
            1. Tap tombol <strong style="color:#fff">⎙ Bagikan</strong> di bawah browser<br>
            2. Pilih <strong style="color:#fff">"Tambahkan ke Layar Utama"</strong><br>
            3. Tap <strong style="color:#fff">Tambahkan</strong> — selesai! 🎉
          </div>
        </div>`;
      document.body.appendChild(banner);
      document.getElementById('ios-dismiss').onclick = () => {
        localStorage.setItem(DISMISSED_KEY, '1');
        banner.remove();
      };
    }, 3000);
  }
})();
</script>
