<!-- ═══ PWA MANIFEST (inline via blob) ═══ -->
<script>
(function(){
  const icons = [
    { src: _makeIcon(192), sizes: '192x192', type: 'image/png', purpose: 'any maskable' },
    { src: _makeIcon(512), sizes: '512x512', type: 'image/png', purpose: 'any maskable' },
  ];
  function _makeIcon(size) {
    const c = document.createElement('canvas');
    c.width = size; c.height = size;
    const ctx = c.getContext('2d');
    // Background gradient
    const g = ctx.createLinearGradient(0, 0, size, size);
    g.addColorStop(0, '#0d1b40'); g.addColorStop(1, '#0a2647');
    ctx.fillStyle = g;
    const r = size * 0.18;
    ctx.beginPath();
    ctx.moveTo(r, 0); ctx.lineTo(size-r, 0);
    ctx.quadraticCurveTo(size, 0, size, r);
    ctx.lineTo(size, size-r);
    ctx.quadraticCurveTo(size, size, size-r, size);
    ctx.lineTo(r, size);
    ctx.quadraticCurveTo(0, size, 0, size-r);
    ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.closePath(); ctx.fill();
    // Calculator icon
    const s = size * 0.55, ox = (size-s)/2, oy = (size-s)/2;
    ctx.strokeStyle = '#60a5fa'; ctx.lineWidth = size * 0.045;
    ctx.lineJoin = 'round'; ctx.lineCap = 'round';
    // body
    ctx.beginPath();
    ctx.roundRect(ox, oy, s, s, size*0.07);
    ctx.stroke();
    // display bar
    const dh = s*0.22, dp = s*0.09;
    ctx.fillStyle = 'rgba(96,165,250,0.2)';
    ctx.beginPath(); ctx.roundRect(ox+dp, oy+dp, s-dp*2, dh, size*0.03); ctx.fill();
    ctx.strokeStyle = '#60a5fa'; ctx.lineWidth = size*0.03;
    ctx.beginPath(); ctx.roundRect(ox+dp, oy+dp, s-dp*2, dh, size*0.03); ctx.stroke();
    // buttons grid (3x3)
    const btnS = s*0.13, gap = (s - dp*2 - btnS*3) / 2, startY = oy + dp + dh + dp*0.8;
    [[0,0,'#34d399'],[1,0,'#60a5fa'],[2,0,'#60a5fa'],
     [0,1,'#60a5fa'],[1,1,'#60a5fa'],[2,1,'#60a5fa'],
     [0,2,'#60a5fa'],[1,2,'#60a5fa'],[2,2,'#fb923c']].forEach(([col,row,color])=>{
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.roundRect(ox+dp+col*(btnS+gap), startY+row*(btnS+gap*0.7), btnS, btnS, size*0.02);
      ctx.fill();
    });
    return c.toDataURL('image/png');
  }
  const manifest = {
    name: 'Upah Borongan',
    short_name: 'Upah Borongan',
    description: 'Aplikasi pencatatan upah borongan produksi',
    start_url: window.location.href,
    display: 'standalone',
    orientation: 'portrait',
    background_color: '#0a0f1e',
    theme_color: '#0a0f1e',
    lang: 'id',
    categories: ['productivity', 'business'],
    icons: icons.map(ic=>({...ic, src: _makeIcon(parseInt(ic.sizes))})),
    shortcuts: [
      { name: 'Input Batch Baru', short_name: 'Input', description: 'Tambah batch baru', url: window.location.href },
    ],
  };
  const blob = new Blob([JSON.stringify(manifest)], {type:'application/manifest+json'});
  const url = URL.createObjectURL(blob);
  const link = document.createElement('link');
  link.rel = 'manifest'; link.href = url;
  document.head.appendChild(link);

  // Apple touch icon
  const appleIcon = _makeIcon(180);
  const appleLink = document.createElement('link');
  appleLink.rel = 'apple-touch-icon'; appleLink.href = appleIcon;
  document.head.appendChild(appleLink);

  // Favicon
  const favLink = document.createElement('link');
  favLink.rel = 'icon'; favLink.type = 'image/png'; favLink.href = _makeIcon(64);
  document.head.appendChild(favLink);
})();
</script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%;scroll-behavior:smooth;height:-webkit-fill-available}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;min-height:100vh;min-height:-webkit-fill-available;overflow-x:hidden;transition:background .3s,color .3s;-webkit-tap-highlight-color:transparent}
button,a{-webkit-tap-highlight-color:transparent;touch-action:manipulation}

:root{
  --brand:#2563eb;--brand-dark:#1d4ed8;--brand-light:#eff6ff;--brand-ring:rgba(37,99,235,.15);
  --green:#059669;--green-light:#f0fdf4;--amber:#d97706;--amber-light:#fffbeb;
  --rose:#e11d48;--purple:#7c3aed;--purple-light:#f5f3ff;
  --ink:#0f172a;--muted:#64748b;--subtle:#94a3b8;
  --border:#e2e8f0;--surface:#f8fafc;--white:#ffffff;--bg:#f1f5f9;
  --card-bg:#ffffff;--card-border:#e2e8f0;
  --radius:12px;--radius-lg:18px;--radius-xl:24px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.06);
  --shadow-lg:0 8px 30px rgba(0,0,0,.12);
  --inp-bg:#f8fafc;--inp-border:#e2e8f0;--inp-color:#0f172a;
  --tbl-head:#f8fafc;--tbl-hover:#fafafa;--tbl-border:#f8fafc;
  --nav-bg:#ffffff;--nav-border:#e2e8f0;--nav-active:#2563eb;
}
[data-theme="dark"]{
  --ink:#f1f5f9;--muted:#94a3b8;--subtle:#64748b;
  --border:#1e293b;--surface:#0f172a;--white:#1e293b;--bg:#0a0f1e;
  --card-bg:#111827;--card-border:#1e293b;
  --brand-light:#1e3a8a;--brand-ring:rgba(37,99,235,.25);
  --green-light:#052e16;--amber-light:#1c1007;--purple-light:#1e1b4b;
  --inp-bg:#0f172a;--inp-border:#1e293b;--inp-color:#f1f5f9;
  --tbl-head:#0f172a;--tbl-hover:#111827;--tbl-border:#111827;
  --shadow:0 1px 3px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.3);
  --shadow-lg:0 8px 30px rgba(0,0,0,.5);
  --nav-bg:#111827;--nav-border:#1e293b;--nav-active:#3b82f6;
}
body{background:var(--bg);color:var(--ink)}

/* ── LAYOUT ── */
.app{min-height:100vh;min-height:-webkit-fill-available;padding-bottom:calc(130px + env(safe-area-inset-bottom,0));padding-top:0}
.container{width:100%;max-width:1380px;margin:0 auto;padding:0 16px}
@media(min-width:768px){.container{padding:0 24px}}

/* ── HEADER ── */
.header{background:linear-gradient(135deg,#0a0f1e 0%,#0d1b40 60%,#0a2647 100%);padding:calc(20px + env(safe-area-inset-top,0)) 0 22px;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 15% 60%,rgba(37,99,235,.18) 0%,transparent 65%),radial-gradient(ellipse at 85% 20%,rgba(5,150,105,.1) 0%,transparent 55%)}
.header-dots{position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.04) 1px,transparent 1px);background-size:26px 26px}
.header-inner{position:relative;z-index:1}
.header-top{display:flex;flex-direction:column;gap:16px}
@media(min-width:768px){.header-top{flex-direction:row;align-items:center;justify-content:space-between}}
.brand{display:flex;align-items:center;gap:14px}
.brand-icon{width:44px;height:44px;background:rgba(37,99,235,.2);border:1px solid rgba(59,130,246,.3);border-radius:14px;display:flex;align-items:center;justify-content:center;color:#60a5fa;flex-shrink:0}
.brand-sub{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.18em;color:rgba(255,255,255,.35);margin-bottom:3px}
.brand-title{font-size:clamp(.95rem,5vw,1.6rem);font-weight:900;color:#fff;letter-spacing:-.03em;line-height:1}
.brand-status{display:flex;align-items:center;gap:7px;margin-top:5px}
.dot-live{width:7px;height:7px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.35)}}
.brand-status span{font-size:.65rem;color:rgba(255,255,255,.4);font-weight:600}
.header-right{display:flex;flex-direction:column;gap:10px}
@media(min-width:768px){.header-right{flex-direction:row;align-items:center}}
.header-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
@media(min-width:768px){.header-stats{display:flex;gap:10px}}
.hstat{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:10px 14px;text-align:center;backdrop-filter:blur(6px)}
.hstat-label{font-size:.52rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.35);margin-bottom:3px}
.hstat-val{font-size:clamp(.72rem,.9rem + .2vw,.95rem);font-weight:900;word-break:break-all}
.header-actions{display:flex;gap:8px;justify-content:flex-end}

/* ── DARK MODE TOGGLE ── */
.dm-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:7px 12px;cursor:pointer;color:#fff;font-family:inherit;font-size:.7rem;font-weight:700;display:flex;align-items:center;gap:6px;transition:all .2s}
.dm-btn:hover{background:rgba(255,255,255,.14)}

/* ════════════════════════
   TOP NAVIGATION BAR
════════════════════════ */
.top-nav{
  background:var(--nav-bg);
  border-bottom:1px solid var(--nav-border);
  position:sticky;top:0;z-index:90;
  box-shadow:0 1px 8px rgba(0,0,0,.06);
}
.top-nav-inner{
  max-width:1380px;margin:0 auto;
  padding:0 10px;
  display:flex;align-items:center;gap:6px;
  height:48px;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.top-nav-inner::-webkit-scrollbar{display:none}
@media(min-width:768px){.top-nav-inner{padding:0 24px}}

.tn-search{position:relative;flex:1;min-width:180px;max-width:320px}
.tn-search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--subtle);pointer-events:none}
.tn-inp{width:100%;padding:7px 32px 7px 32px;background:var(--surface);border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-weight:600;font-size:.8rem;color:var(--inp-color);outline:none;transition:border-color .15s,box-shadow .15s}
.tn-inp:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-ring)}
.tn-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--subtle);cursor:pointer;display:flex;padding:2px}
.tn-clear:hover{color:var(--rose)}
.tn-div{width:1px;height:24px;background:var(--border);flex-shrink:0}
.tn-pill{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;background:var(--surface);border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:.72rem;font-weight:700;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.tn-pill:hover{border-color:var(--brand);color:var(--brand);background:var(--brand-light)}
.tn-pill.active{background:var(--brand);color:#fff;border-color:var(--brand)}
.tn-pill .pill-x{width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,.25);display:inline-flex;align-items:center;justify-content:center;font-size:.55rem;margin-left:2px}
.tn-select{padding:6px 10px;background:var(--surface);border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:.72rem;font-weight:700;color:var(--muted);cursor:pointer;outline:none;flex-shrink:0;transition:border-color .15s;-webkit-appearance:none;-moz-appearance:none;appearance:none}
.tn-select:focus{border-color:var(--brand)}
.tn-date-wrap{position:relative;flex-shrink:0}
.tn-date-wrap input[type=date]{position:absolute;inset:0;opacity:0;cursor:pointer;z-index:2;width:100%}

/* ════════════════════════
   BOTTOM TAB NAV
════════════════════════ */
.bottom-nav{
  position:fixed;bottom:56px;left:0;right:0;z-index:95;
  background:var(--nav-bg);
  border-top:1px solid var(--nav-border);
  box-shadow:0 -4px 20px rgba(0,0,0,.08);
  padding-bottom:env(safe-area-inset-bottom,0);
  -webkit-transform:translateZ(0);transform:translateZ(0);
  will-change:transform;
}
.bottom-nav-inner{max-width:1380px;margin:0 auto;display:flex;}
.bnav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;padding:7px 2px 8px;min-width:0;overflow:hidden;
  border:none;background:transparent;cursor:pointer;
  font-family:inherit;transition:all .18s;
  color:var(--subtle);border-top:2px solid transparent;
  position:relative;
}
.bnav-item.active{color:var(--brand);border-top-color:var(--brand)}
.bnav-item:hover:not(.active){color:var(--muted);background:var(--surface)}
.bnav-label{font-size:.52rem;font-weight:800;text-transform:uppercase;letter-spacing:.03em;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.bnav-badge{position:absolute;top:8px;right:calc(50% - 22px);background:var(--brand);color:#fff;font-size:.5rem;font-weight:900;min-width:16px;height:16px;border-radius:100px;display:flex;align-items:center;justify-content:center;padding:0 4px}
@media(max-width:360px){
  .bnav-label{font-size:.44rem;letter-spacing:.01em}
  .bnav-item{padding:8px 1px 9px;gap:2px}
}
@media(min-width:640px){
  .bottom-nav{bottom:56px}
  .bnav-label{font-size:.65rem}
}

/* ── CARD ── */
.card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius-lg);box-shadow:var(--shadow);overflow:hidden}
.card-head{padding:14px 18px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.card-title{display:flex;align-items:center;gap:8px;font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.card-body{padding:18px}
@media(min-width:768px){.card-body{padding:24px}}

/* ═══════════════════════════════
   MOBILE RESPONSIF KOMPREHENSIF
═══════════════════════════════ */
@media(max-width:480px){
  /* Container & spacing */
  .container{padding:0 10px}
  .card{border-radius:12px}
  .card-body{padding:12px}
  .card-head{padding:10px 12px}

  /* Header lebih compact */
  .header{padding:calc(14px + env(safe-area-inset-top,0)) 0 14px}
  .brand-icon{width:36px;height:36px;border-radius:10px}
  .brand-title{font-size:1.1rem}
  .brand-sub{font-size:.5rem;letter-spacing:.12em}
  .brand-status span{font-size:.55rem}
  .hstat{padding:7px 10px}
  .hstat-label{font-size:.44rem;letter-spacing:.07em}
  .hstat-val{font-size:.8rem}
  .header-stats{gap:5px}
  .header-actions{gap:5px}
  .dm-btn{padding:5px 9px;font-size:.62rem;gap:4px}

  /* Top nav filter compact */
  .top-nav-inner{height:46px;gap:6px;padding:0 10px}
  .tn-pill{padding:5px 9px;font-size:.65rem}
  .tn-inp{font-size:.72rem;padding:5px 28px 5px 28px}

  /* Form grid full-width di mobile */
  .fg-2,.fg-3,.fg-4{grid-template-columns:1fr !important}

  /* Calc bar vertikal di mobile */
  .calc-bar{flex-direction:column;gap:10px;align-items:stretch}
  .calc-amount{font-size:1.4rem}
  .dur-pill{align-self:flex-start}

  /* Log items compact */
  .log-item-header{font-size:.7rem}
  .badge{font-size:.5rem;padding:2px 6px}

  /* Pegawai cards 1 kolom */
  .peg-cards{grid-template-columns:1fr !important}

  /* Modal full-width */
  .modal{margin:10px;max-width:calc(100vw - 20px) !important;padding:16px !important}

  /* App padding untuk 5 tab + footer */
  .app{padding-bottom:calc(125px + env(safe-area-inset-bottom,0))}

  /* Autocomplete dropdown */
  .ac-list{max-height:200px}
}

@media(max-width:360px){
  .container{padding:0 8px}
  .brand-title{font-size:1rem}
  .header-stats{grid-template-columns:repeat(3,1fr)}
  .hstat-val{font-size:.72rem}
  .modal{margin:6px;max-width:calc(100vw - 12px) !important}
}

@media(min-width:481px) and (max-width:767px){
  .fg-2{grid-template-columns:1fr 1fr}
  .fg-3{grid-template-columns:1fr 1fr}
  .peg-cards{grid-template-columns:repeat(2,1fr)}
  .modal{max-width:480px}
}

/* ── FORM GRID ── */
.fg-row{display:grid;gap:12px;margin-bottom:14px}
.fg-2{grid-template-columns:1fr}
.fg-3{grid-template-columns:1fr}
.fg-4{grid-template-columns:1fr 1fr}
@media(min-width:540px){.fg-2{grid-template-columns:1fr 1fr}.fg-3{grid-template-columns:1fr 1fr}}
@media(min-width:768px){.fg-2{grid-template-columns:2fr 1fr 1fr}.fg-3{grid-template-columns:1fr 1fr 1fr 1fr auto}.fg-4{grid-template-columns:1fr 1fr 1fr 1fr 1fr}}

/* ── INPUTS ── */
.lbl{display:block;font-size:.58rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:4px}
.inp{width:100%;padding:10px 13px;background:var(--inp-bg);border:1.5px solid var(--inp-border);border-radius:10px;font-family:inherit;font-weight:700;font-size:1rem;color:var(--inp-color);outline:none;transition:border-color .15s,box-shadow .15s,background .15s;-webkit-appearance:none}
.inp:focus{border-color:var(--brand);background:var(--white);box-shadow:0 0 0 3px var(--brand-ring)}
.inp::placeholder{color:var(--subtle);font-weight:500}
.inp-num{font-size:1.2rem;font-weight:900;text-align:center;letter-spacing:-.02em;padding:11px 8px;-webkit-appearance:none}
.inp-green{color:#047857;background:#f0fdf4;border-color:#a7f3d0}
[data-theme="dark"] .inp-green{color:#34d399;background:#052e16;border-color:#065f46}
.inp-green:focus{border-color:var(--green)}
.inp-blue{color:#1d4ed8;background:#eff6ff;border-color:#bfdbfe}
[data-theme="dark"] .inp-blue{color:#93c5fd;background:#1e3a8a;border-color:#1d4ed8}
.inp-blue:focus{border-color:var(--brand)}
.inp-amber{color:#b45309;background:#fffbeb;border-color:#fde68a}
[data-theme="dark"] .inp-amber{color:#fbbf24;background:#1c1007;border-color:#92400e}
.inp-amber:focus{border-color:var(--amber)}
.inp-purple{color:#6d28d9;background:#f5f3ff;border-color:#ddd6fe}
[data-theme="dark"] .inp-purple{color:#c4b5fd;background:#1e1b4b;border-color:#4c1d95}
.inp-purple:focus{border-color:var(--purple)}

/* ─── TDS input style ─── */
.inp-tds{color:#b45309;background:#fffbeb;border-color:#fde68a}

/* ════════════════════════
   SLIP GAJI MODAL
════════════════════════ */
.slip-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:12px;overscroll-behavior:contain}
.slip-modal{background:#fff;border-radius:18px;width:100%;max-width:440px;max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;box-shadow:0 20px 60px rgba(0,0,0,.4);position:relative}
@media(max-width:480px){.slip-modal{max-height:95vh;border-radius:14px 14px 0 0;align-self:flex-end;max-width:100%;width:100%;padding-bottom:env(safe-area-inset-bottom,0)}}
.slip-header{background:linear-gradient(135deg,#0a0f1e 0%,#0d1b40 60%,#0a2647 100%);padding:22px 22px 18px;border-radius:18px 18px 0 0;position:relative;overflow:hidden}
@media(max-width:480px){.slip-header{border-radius:14px 14px 0 0}}
.slip-header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(37,99,235,.2),transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(5,150,105,.12),transparent 50%)}

.slip-body{padding:18px 20px}

.slip-period-label{font-size:.55rem;font-weight:900;text-transform:uppercase;letter-spacing:.1em;color:#94a3b8}

.slip-batch-item{background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:11px 13px;margin-bottom:8px}
.slip-batch-name{font-size:.82rem;font-weight:800;color:#0f172a;margin-bottom:3px}
.slip-batch-meta{font-size:.62rem;color:#64748b;font-weight:600;margin-bottom:6px}
.slip-batch-amounts{display:flex;gap:6px;flex-wrap:wrap}

.tpl-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:var(--brand-light);border:1px solid rgba(37,99,235,.2);border-radius:8px;font-size:.66rem;font-weight:700;color:var(--brand);cursor:pointer;transition:all .15s;white-space:nowrap}

[data-theme="dark"] .dur-val{color:#60a5fa}
.dur-unit{font-size:.58rem;color:#0284c7;font-weight:700;margin-left:2px}

/* Pegawai grid */
.pegawai-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}

@media(min-width:900px){.pegawai-grid{grid-template-columns:repeat(4,1fr)}}

/* ── CALC BAR ── */
.calc-bar{background:linear-gradient(135deg,#0a0f1e,#0d1b40);border-radius:var(--radius-lg);padding:16px 18px;display:flex;flex-direction:column;gap:14px;margin-top:4px}
@media(min-width:640px){.calc-bar{flex-direction:row;align-items:center;justify-content:space-between}}
.calc-est{color:rgba(255,255,255,.4);font-size:.56rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px}
.calc-amount{font-size:clamp(1rem,4vw,1.8rem);font-weight:900;color:#fb923c;letter-spacing:-.03em;word-break:break-all}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:10px;font-family:inherit;font-weight:800;font-size:.75rem;text-transform:uppercase;letter-spacing:.05em;cursor:pointer;transition:all .15s;padding:10px 18px;white-space:nowrap}

.btn-primary{background:var(--brand);color:#fff;padding:12px 24px;font-size:.8rem}
.btn-primary:hover{background:var(--brand-dark);box-shadow:0 4px 16px rgba(37,99,235,.35)}
.btn-primary:disabled{opacity:.6;pointer-events:none}
.btn-sm{padding:7px 12px;font-size:.68rem}
.btn-ghost{background:transparent;color:var(--muted);border:1.5px solid var(--border)}
.btn-ghost:hover{border-color:var(--brand);color:var(--brand);background:var(--brand-light)}
.btn-excel{background:#166534;color:#fff}

.btn-gsheet{background:#1558d6;color:#fff}
.btn-gsheet:hover{background:#1148c2;box-shadow:0 4px 14px rgba(21,88,214,.35)}
.btn-danger{background:#fff1f2;color:var(--rose);border:1.5px solid #fecdd3}
[data-theme="dark"] .btn-danger{background:rgba(225,29,72,.1);border-color:rgba(225,29,72,.3)}
.btn-danger:hover{background:var(--rose);color:#fff;border-color:var(--rose)}
.btn-full{width:100%}
.btn-json{background:#7c3aed;color:#fff}
.btn-json:hover{background:#6d28d9;box-shadow:0 4px 14px rgba(124,58,237,.35)}

/* ── TABLE ── */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:580px}
thead tr{background:var(--tbl-head);border-bottom:1px solid var(--border)}
th{padding:11px 14px;font-size:.56rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--subtle);text-align:left;white-space:nowrap}
td{padding:13px 14px;vertical-align:top;color:var(--ink)}
tbody tr{border-bottom:1px solid var(--tbl-border);cursor:pointer;transition:background .1s}
tbody tr:hover{background:var(--tbl-hover)}
tbody tr.expanded{background:var(--brand-light)}
.expand-row td{padding:0}
.expand-inner{padding:12px 16px;background:var(--surface);border-bottom:2px solid rgba(37,99,235,.2)}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:100px;font-size:.56rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
.badge-blue{background:#dbeafe;color:#1d4ed8}
[data-theme="dark"] .badge-blue{background:#1e3a8a;color:#93c5fd}
.badge-green{background:#d1fae5;color:#065f46}
[data-theme="dark"] .badge-green{background:#052e16;color:#34d399}
.badge-slate{background:var(--surface);color:var(--muted);border:1px solid var(--border)}
.badge-amber{background:#fef3c7;color:#92400e}
[data-theme="dark"] .badge-amber{background:#1c1007;color:#fbbf24}
.badge-hit{background:var(--brand);color:#fff}

/* ── PEGAWAI CARDS ── */
.peg-cards{display:grid;grid-template-columns:1fr;gap:10px}
@media(min-width:480px){.peg-cards{grid-template-columns:repeat(2,1fr)}}
@media(min-width:900px){.peg-cards{grid-template-columns:repeat(3,1fr)}}
@media(min-width:1200px){.peg-cards{grid-template-columns:repeat(4,1fr)}}
.peg-card{background:linear-gradient(135deg,#1e293b,#0f172a);border:1px solid #1e2d4a;border-radius:14px;padding:14px;transition:all .2s}
.peg-card:hover{border-color:#2563eb;transform:translateY(-1px)}
.peg-card.active{background:linear-gradient(135deg,#1d4ed8,#1e3a8a);border-color:#3b82f6}
.peg-name{font-weight:900;font-size:.85rem;color:#f1f5f9;text-transform:uppercase;margin-bottom:2px;word-break:break-all}
.peg-meta{font-size:.58rem;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.06em}
.peg-stats{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:10px 0}
.peg-stat{background:rgba(255,255,255,.04);border-radius:8px;padding:7px 9px;border:1px solid rgba(255,255,255,.05)}
.peg-card.active .peg-stat{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.15)}
.peg-stat-lbl{font-size:.5rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}
.peg-stat-val{font-size:.78rem;font-weight:900}
.progress{height:4px;background:rgba(255,255,255,.08);border-radius:100px;overflow:hidden;margin:9px 0 7px}
.progress-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,#2563eb,#60a5fa);transition:width .5s ease}
.peg-total-row{display:flex;justify-content:space-between;align-items:center;padding-top:7px;border-top:1px solid rgba(255,255,255,.05)}
.peg-total-lbl{font-size:.56rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:#475569}
.peg-total-val{font-size:1.1rem;font-weight:900;color:#fb923c}

/* ── TOP EARNER ── */
.top-banner{background:linear-gradient(135deg,#78350f,#92400e);border:1px solid #b45309;border-radius:14px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.top-crown{color:#fbbf24;text-align:center;font-size:.52rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;flex-shrink:0}
.top-info{flex:1;min-width:0}
.top-name{font-weight:900;font-size:.95rem;color:#fff;text-transform:uppercase;word-break:break-all}
.top-sub{font-size:.65rem;color:rgba(255,255,255,.55);font-weight:600;margin-top:2px}
.top-amount{text-align:right;flex-shrink:0}
.top-amount-lbl{font-size:.52rem;font-weight:800;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:2px}
.top-amount-val{font-size:1.3rem;font-weight:900;color:#fbbf24}

/* ── CHART ── */
.chart-grid{display:grid;grid-template-columns:1fr;gap:14px;margin-bottom:16px}
@media(min-width:768px){.chart-grid{grid-template-columns:1fr 1fr}}
.chart-box{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius-lg);padding:16px;box-shadow:var(--shadow)}
.chart-title{font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.chart-wrap{position:relative;height:190px}
@media(min-width:768px){.chart-wrap{height:210px}}

/* ── MODALS ── */
.overlay{position:fixed;inset:0;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;background:rgba(0,0,0,.65);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--card-bg);border-radius:var(--radius-xl);padding:28px;width:100%;max-width:380px;box-shadow:0 25px 50px rgba(0,0,0,.35);animation:modalIn .22s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
.modal-icon{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.modal-icon.success{background:#d1fae5;color:#059669}
.modal-icon.danger{background:#fff1f2;color:var(--rose)}
.modal h2{font-size:1.25rem;font-weight:900;text-align:center;margin-bottom:5px;color:var(--ink)}
.modal p{color:var(--muted);text-align:center;font-size:.85rem;margin-bottom:18px}
.modal-result{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 16px;margin-bottom:20px;text-align:center}
.modal-result-lbl{font-size:.56rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--subtle);margin-bottom:3px}
.modal-result-val{font-size:1.5rem;font-weight:900;color:var(--brand)}
.modal-btns{display:flex;gap:10px}

/* ── GSHEET MODAL ── */
.gsheet-modal{max-width:500px;padding:22px 26px}
.gs-status{padding:9px 14px;border-radius:10px;font-size:.76rem;font-weight:700;text-align:center}
.gs-status.connected{background:#d1fae5;color:#065f46;border:1px solid #6ee7b7}
[data-theme="dark"] .gs-status.connected{background:#052e16;border-color:#065f46}
.gs-status.pending{background:#fef3c7;color:#92400e;border:1px solid #fcd34d}
[data-theme="dark"] .gs-status.pending{background:#1c1007;border-color:#92400e}
.gs-status.error{background:#fff1f2;color:var(--rose);border:1px solid #fecdd3}
[data-theme="dark"] .gs-status.error{background:rgba(225,29,72,.1);border-color:rgba(225,29,72,.3)}

/* ── BACKUP MODAL ── */
.backup-modal{max-width:420px}
.backup-info{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:12px}
.backup-info-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.backup-info-row:last-child{margin-bottom:0}
.backup-info-label{font-size:.66rem;font-weight:700;color:var(--muted)}
.backup-info-val{font-size:.76rem;font-weight:800;color:var(--ink)}

/* ── FOOTER BAR ── */
.footer-bar{position:fixed;bottom:0;left:0;right:0;z-index:100;-webkit-transform:translateZ(0);transform:translateZ(0);will-change:transform;background:linear-gradient(135deg,#0a0f1e,#0d1b40);border-top:1px solid rgba(255,255,255,.06);padding:6px 16px;padding-bottom:env(safe-area-inset-bottom,0)}
.footer-inner{max-width:1380px;margin:0 auto;display:flex;flex-direction:row;align-items:center;justify-content:space-between;gap:10px;min-height:44px}
.footer-stats{display:flex;gap:14px;flex-wrap:nowrap;overflow:hidden}
.fstat{text-align:left;flex-shrink:0}
.fstat-lbl{font-size:.48rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.3);margin-bottom:0}
.fstat-val{font-size:.82rem;font-weight:900}
.footer-btns{display:flex;gap:6px;flex-shrink:0}
@media(max-width:480px){.footer-stats{display:none}}

/* ── EXPAND ── */
.exp-grid{display:grid;grid-template-columns:1fr;gap:8px}
@media(min-width:640px){.exp-grid{grid-template-columns:repeat(3,1fr)}}
.exp-box{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:11px}
.exp-lbl{font-size:.56rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--subtle);margin-bottom:6px}
.exp-row{font-size:.78rem;font-weight:600;margin-bottom:3px;color:var(--ink)}
.exp-row span{color:var(--subtle);font-weight:500}

/* ── NOTIF ── */
.notif{position:fixed;top:16px;right:16px;z-index:999;display:flex;align-items:center;gap:10px;padding:10px 16px;border-radius:12px;color:#fff;font-size:.76rem;font-weight:700;box-shadow:var(--shadow-lg);animation:notifIn .22s ease;max-width:320px}
@keyframes notifIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.notif.success{background:#059669}.notif.error{background:#e11d48}.notif.info{background:#1d4ed8}
.notif-close{background:none;border:none;color:rgba(255,255,255,.7);cursor:pointer;display:flex;padding:2px;margin-left:4px}

/* ── EMPTY ── */
.empty{padding:48px 24px;text-align:center;color:var(--subtle);font-style:italic;font-weight:600;font-size:.86rem}
.text-right{text-align:right}

/* Section heading */
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}

/* readonly style */
.inp-readonly{opacity:.75;cursor:not-allowed;background:repeating-linear-gradient(45deg,transparent,transparent 4px,rgba(0,0,0,.03) 4px,rgba(0,0,0,.03) 8px)!important}
[data-theme="dark"] .inp-readonly{background:repeating-linear-gradient(45deg,transparent,transparent 4px,rgba(255,255,255,.03) 4px,rgba(255,255,255,.03) 8px)!important}

/* iOS scroll lock when modal open */
body.modal-open{overflow:hidden;position:fixed;width:100%}
/* Fix for iOS input date/time */
input[type="date"],input[type="time"]{-webkit-appearance:none;appearance:none;background:var(--inp-bg);color:var(--inp-color)}
/* Fix select font on iOS */
select{font-size:1rem;-webkit-appearance:none}
</style>

/* ═══ AUTOCOMPLETE PRODUK INPUT ═══ */
const ProdukInput = ({ value, onChange, onSelectProduk, katalog=[] }) => {
  const [show, setShow] = useState(false);
  const [focused, setFocused] = useState(false);
  const suggestions = useMemo(() => {
    if (!value.trim()) return katalog.slice(0, 8);
    const q = value.trim().toLowerCase();
    return katalog.filter(p => p.nama.toLowerCase().includes(q)).slice(0, 8);
  }, [value, katalog]);
  useEffect(() => { setShow(focused && suggestions.length > 0); }, [focused, suggestions]);
  const highlight = (nama) => {
    if (!value.trim()) return nama;
    const q = value.trim();
    const i = nama.toLowerCase().indexOf(q.toLowerCase());
    if (i < 0) return nama;
    return <>{nama.slice(0,i)}<em style={{background:'#fef08a',color:'#78350f',fontStyle:'normal',borderRadius:2}}>{nama.slice(i,i+q.length)}</em>{nama.slice(i+q.length)}</>;
  };
  const handleSelect = (produk) => {
    onSelectProduk(produk);
    setShow(false);
  };
  return (
    <div className="ac-wrap">
      <input
        className="inp"
        value={value}
        onChange={e => onChange(e.target.value)}
        onFocus={() => setFocused(true)}
        onBlur={() => setTimeout(() => setFocused(false), 150)}
        placeholder="Ketik nama produk atau pilih dari katalog..."
        required
        style={{fontWeight:700, fontSize:'.95rem'}}
      />
      {show && (
        <div className="ac-list" style={{maxHeight:280, overflowY:'auto'}}>
          {!value.trim() && <div style={{padding:'6px 12px 4px',fontSize:'.56rem',fontWeight:900,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--subtle)'}}>Katalog Produk 2025</div>}
          {suggestions.map((p, i) => (
            <div key={i} className="ac-item" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}
              onMouseDown={() => handleSelect(p)}>
              <span style={{display:'flex',alignItems:'center',gap:6}}><Ic n="box" s={11}/> {highlight(p.nama)}</span>
              <span style={{fontSize:'.65rem',fontWeight:800,color:'#059669',flexShrink:0,marginLeft:8}}>Rp {(typeof p.harga==='number'?p.harga:parseFloat(String(p.harga||0).replace(',','.'))||0).toLocaleString('id-ID',{minimumFractionDigits:2,maximumFractionDigits:2})}</span>
            </div>
          ))}
          {value.trim() && suggestions.length === 0 && (
            <div style={{padding:'10px 12px',fontSize:'.72rem',color:'var(--subtle)',textAlign:'center'}}>Produk tidak ditemukan — isi manual</div>
          )}

  );
};

const PegawaiInput = ({ value, onChange, placeholder, allNames }) => {

  const suggestions = useMemo(() => {
    if (!value.trim() || !allNames.length) return [];
    const q = value.trim().toLowerCase();
    return allNames.filter(n => n.toLowerCase().includes(q) && n.toLowerCase() !== q.toLowerCase()).slice(0, 6);
  }, [value, allNames]);
  useEffect(() => { setShow(focused && suggestions.length > 0); }, [focused, suggestions]);
  const highlight = (name) => {
    const q = value.trim();
    const i = name.toLowerCase().indexOf(q.toLowerCase());
    if (i < 0) return name;
    return <>{name.slice(0,i)}<em>{name.slice(i,i+q.length)}</em>{name.slice(i+q.length)}</>;
  };
  return (
    <div className="ac-wrap">
      <input className="inp peg-inp" value={value} onChange={e=>onChange(e.target.value)}
        onFocus={()=>setFocused(true)} onBlur={()=>setTimeout(()=>setFocused(false),150)}

        </div>

  );
};

/* ═══ CHART COMPONENTS ═══ */
const ChartBar = ({ data, color }) => {
  const ref = useRef(); const chartRef = useRef();
  useEffect(() => {
    if (!ref.current || !data.length) return;
    if (chartRef.current) chartRef.current.destroy();
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    const gridColor = isDark ? 'rgba(255,255,255,.07)' : 'rgba(0,0,0,.06)';
    const textColor = isDark ? '#64748b' : '#94a3b8';
    chartRef.current = new Chart(ref.current, {
      type: 'bar',
      data: { labels: data.map(d=>d.label), datasets: [{ data: data.map(d=>d.val), backgroundColor: color+'cc', borderColor: color, borderWidth: 1.5, borderRadius: 5 }] },
      options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>'Rp '+(ctx.raw||0).toLocaleString('id-ID',{minimumFractionDigits:2,maximumFractionDigits:2})}}},
        scales:{ x:{grid:{color:gridColor},ticks:{color:textColor,font:{size:10,weight:'700'}}}, y:{grid:{color:gridColor},ticks:{color:textColor,font:{size:10},callback:v=>'Rp'+Math.floor(v/1000)+'rb'}} } }
    });
    return () => chartRef.current?.destroy();
  }, [data, color]);
  return <canvas ref={ref}/>;
};

/* ═══ BACKUP MODAL ═══ */
const BackupModal = ({ history, onImport, onClose, toast, initialTab='export' }) => {
  const [tab, setTab] = useState(initialTab);
  const [dragOver, setDragOver] = useState(false);
  const fileRef = useRef();

  const doExport = () => {
    const payload = { _app:'upah-borongan-claude', _ver:3, _exported: new Date().toISOString(), history,
      _gs:{ sheetId:localStorage.getItem('gs_sheet_id')||'', sheetUrl:localStorage.getItem('gs_sheet_url')||'', clientId:localStorage.getItem('gs_client_id')||'' } };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `upah-backup-${new Date().toISOString().slice(0,10)}.json`; a.click();
    toast(`Backup berhasil! (${history.length} batch)`, 'success');
  };

  const doImport = (file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const data = JSON.parse(e.target.result);
        const rows = data.history || (Array.isArray(data) ? data : null);
        if (!rows) { toast('Format file tidak valid!', 'error'); return; }
        onImport(rows);
        if (data._gs) {
          if (data._gs.sheetId) localStorage.setItem('gs_sheet_id', data._gs.sheetId);
          if (data._gs.sheetUrl) localStorage.setItem('gs_sheet_url', data._gs.sheetUrl);
          if (data._gs.clientId) localStorage.setItem('gs_client_id', data._gs.clientId);
        }

};

/* ═══ GSHEET MODAL ═══ */
const GSheetModal = ({ history, akumulasi, onClose, showNotif }) => {
  const [clientId, setClientId] = useState(()=>localStorage.getItem('gs_client_id')||'');
  const [spreadsheetId, setSpreadsheetId] = useState(()=>localStorage.getItem('gs_sheet_id')||'');
  const [status, setStatus] = useState('idle');
  const [errMsg, setErrMsg] = useState('');
  const [sheetUrl, setSheetUrl] = useState(()=>localStorage.getItem('gs_sheet_url')||'');
  const [token, setToken] = useState(null);
  const pendingAction = useRef(null);
  const [tutorStep, setTutorStep] = useState(clientId?'input':0);
  const domainUrl = window.location.origin||'http://localhost';

  const saveConfig = () => {
    localStorage.setItem('gs_client_id', clientId);
    if(spreadsheetId) localStorage.setItem('gs_sheet_id', spreadsheetId);
    if(sheetUrl) localStorage.setItem('gs_sheet_url', sheetUrl);
  };

  const initTokenClient = useCallback(()=>{
    if(!clientId.trim()){setErrMsg('Masukkan Client ID terlebih dahulu.');setStatus('error');return null;}
    if(!window.google?.accounts?.oauth2){setErrMsg('Library Google belum dimuat. Refresh halaman.');setStatus('error');return null;}
    const tc = window.google.accounts.oauth2.initTokenClient({
      client_id:clientId.trim(), scope:GS_SCOPES,
      callback:(resp)=>{
        if(resp.error){setErrMsg('Login gagal: '+resp.error);setStatus('error');return;}
        setToken(resp.access_token); setStatus('signed');
        if(pendingAction.current){pendingAction.current(resp.access_token);pendingAction.current=null;}
      }
    });
    return tc;
  },[clientId]);

  const signIn = ()=>{saveConfig();setStatus('signing');const tc=initTokenClient();if(tc){pendingAction.current=null;tc.requestAccessToken();}};

  const fetchExistingLogIds = async(accessToken,sid)=>{
    try{
      const res=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sid}/values/Log%20Produksi!A1:R5000`,{headers:{'Authorization':`Bearer ${accessToken}`}});
      if(!res.ok) return new Set();
      const data=await res.json(); const rows=data.values||[]; const ids=new Set();
      rows.slice(4).forEach(r=>{if(r[17])ids.add(String(r[17]));});
      return ids;
    }catch{return new Set();}
  };

  const buildAllValues = (newOnly=[])=>{
    const now=new Date().toLocaleString('id-ID');

    const mapLog=x=>[x.tanggal,x.namaBarang,x.nomorBatch,x.jamAwal||'-',x.jamAkhir||'-',+(x.durasi||0).toFixed(2),+(x.jumlahDus||0),+(x.jumlahBox||0),+(x.jumlahOrang||0),toF(x.hargaPerJam),toF(x.hargaPerDus),+(x.jamPerOrang||0).toFixed(2),+(x.dusPerOrang||0).toFixed(2),+(x.perOrang||0).toFixed(2),+(x.total||0).toFixed(2),(x.listPegawai||[]).join(', '),x.catatan||'',String(x.id)];
    const newLogRows=newOnly.map(mapLog);
    const akuRows=[['=== AKUMULASI PEGAWAI ==='],['Diperbarui:',now],[],['No','Nama','Jml Batch','Total Upah Jam','Total Upah Dus','Total Gaji','Rata-rata/Batch'],...akumulasi.map((p,i)=>[i+1,p.nama,p.batchCount,Math.floor(p.totalJam),Math.floor(p.totalDus),Math.floor(p.totalSemua),Math.floor(p.totalSemua/p.batchCount)])];
    const bulanan={};
    history.forEach(x=>{const bln=(x.tanggal||'').slice(0,7);if(!bln)return;if(!bulanan[bln])bulanan[bln]={batch:0,orang:new Set(),dus:0,box:0,jam:0,upahJam:0,upahDus:0,total:0};const b=bulanan[bln];b.batch++;(x.listPegawai||[]).forEach(n=>b.orang.add(n.trim().toUpperCase()));b.dus+=+(x.jumlahDus||0);b.box+=+(x.jumlahBox||0);b.jam+=+(x.durasi||0);b.upahJam+=Math.floor(x.jamPerOrang||0)*(+(x.jumlahOrang||0)||1);b.upahDus+=Math.floor(x.dusPerOrang||0)*(+(x.jumlahOrang||0)||1);b.total+=Math.floor(x.total||0);});
    const blnKeys=Object.keys(bulanan).sort();
    const ringkasRows=[['=== RINGKASAN BULANAN ==='],['Diperbarui:',now],[],['Bulan','Total Batch','Total Pegawai Unik','Total Dus','Total Box','Total Jam Kerja','Total Upah Jam','Total Upah Dus','Total Gaji','Avg Gaji/Orang','Avg Gaji/Batch'],...blnKeys.map(k=>{const b=bulanan[k];const[yr,mo]=k.split('-');const nm=new Date(+yr,+mo-1,1).toLocaleString('id-ID',{month:'long',year:'numeric'});return[nm,b.batch,b.orang.size,b.dus,b.box,+b.jam.toFixed(1),+b.upahJam.toFixed(2),+b.upahDus.toFixed(2),+b.total.toFixed(2),b.orang.size>0?+(b.total/b.orang.size).toFixed(2):0,b.batch>0?+(b.total/b.batch).toFixed(2):0];}),[], ['TOTAL',blnKeys.length+' bulan','','','','',+blnKeys.reduce((s,k)=>s+bulanan[k].upahJam,0).toFixed(2),+blnKeys.reduce((s,k)=>s+bulanan[k].upahDus,0).toFixed(2),+blnKeys.reduce((s,k)=>s+bulanan[k].total,0).toFixed(2),'','']];
    const detailRows=[['=== DETAIL PER BULAN ==='],['Diperbarui:',now],[]];
    blnKeys.forEach(k=>{const[yr,mo]=k.split('-');const nm=new Date(+yr,+mo-1,1).toLocaleString('id-ID',{month:'long',year:'numeric'});detailRows.push(['— '+nm.toUpperCase()+' —']);detailRows.push(LOG_H);const bb=history.filter(x=>(x.tanggal||'').slice(0,7)===k);let sub=0;bb.forEach(x=>{detailRows.push(mapLog(x));sub+=(x.total||0);});detailRows.push(['','','','','','','','','','','','','','','SUBTOTAL '+nm,'','Rp '+sub.toLocaleString('id-ID',{minimumFractionDigits:2,maximumFractionDigits:2}),'']);detailRows.push([]);});
    return{newLogRows,akuRows,ringkasRows,detailRows,LOG_H};
  };

  const createSheet = async(accessToken)=>{
    setStatus('syncing');
    try{
      const r=await fetch('https://sheets.googleapis.com/v4/spreadsheets',{method:'POST',headers:{'Authorization':`Bearer ${accessToken}`,'Content-Type':'application/json'},body:JSON.stringify({properties:{title:SHEET_TITLE},sheets:[{properties:{title:'Log Produksi',index:0}},{properties:{title:'Akumulasi Pegawai',index:1}},{properties:{title:'Ringkasan Bulanan',index:2}},{properties:{title:'Detail per Bulan',index:3}}]})});

  const writeToSheet = async(accessToken,sid,isNew=false)=>{

        await api(`/values/Log%20Produksi!A1?valueInputOption=RAW`,'PUT',{values:initLog});

      const info=newLogRows.length>0?` (+${newLogRows.length} batch baru)`:'';
      setStatus('synced');showNotif(`✓ Sync berhasil!${info}`,'success');
    }catch(e){setErrMsg(e.message);setStatus('error');}
  };

  const doSync = async()=>{
    if(!token){saveConfig();const tc=initTokenClient();if(tc){pendingAction.current=spreadsheetId?(t)=>writeToSheet(t,spreadsheetId):(t)=>createSheet(t);tc.requestAccessToken();}return;}
    if(spreadsheetId) await writeToSheet(token,spreadsheetId); else await createSheet(token);
  };

  const tutorSteps = [
    {emoji:'🌐',title:'Buka Google Cloud Console',color:'#1d4ed8',bg:'#eff6ff',border:'#bfdbfe',substeps:[{i:'1',t:<>Klik tombol di bawah → browser buka tab baru</>},{i:'2',t:<>Klik <strong>Pilih Proyek</strong> → <strong>Proyek Baru</strong> → isi nama → <strong>Buat</strong></>}],action:{label:'🌐 Buka Google Cloud Console',url:'https://console.cloud.google.com'},tip:'Kalau muncul halaman persetujuan → klik Setuju saja.'},
    {emoji:'⚡',title:'Aktifkan Google Sheets API',color:'#059669',bg:'#f0fdf4',border:'#a7f3d0',substeps:[{i:'1',t:<>Pastikan proyek baru sudah terpilih</>},{i:'2',t:<>Klik tombol di bawah → klik <strong>AKTIFKAN / ENABLE</strong></>}],action:{label:'⚡ Buka Halaman Sheets API',url:'https://console.cloud.google.com/apis/library/sheets.googleapis.com'},tip:'Kalau tombol bertuliskan "Kelola" — sudah aktif.'},

    {emoji:'🔗',title:'Daftarkan Domain',color:'#d97706',bg:'#fffbeb',border:'#fde68a',substeps:[{i:'1',t:<>Cari <strong>Authorized JavaScript origins</strong></>},{i:'2',t:<><strong>+ TAMBAHKAN URI</strong> → paste alamat di bawah</>},{i:'3',t:<>Klik <strong>BUAT</strong> → copy <strong>Client ID</strong></>}],copyDomain:domainUrl,tip:'Client Secret tidak perlu dicopy.'},
    {emoji:'✅',title:'Paste Client ID & Sync!',color:'#059669',bg:'#f0fdf4',border:'#a7f3d0',substeps:[{i:'1',t:<>Paste Client ID ke kolom di bawah</>},{i:'2',t:<>Klik <strong>Login Google</strong> → izinkan</>},{i:'3',t:<>Klik <strong>Buat Spreadsheet & Sync</strong> 🎉</>}],tip:'Client ID tersimpan otomatis untuk sesi berikutnya.'},
  ];
  const isInTutor = typeof tutorStep === 'number';

        {isInTutor&&ct&&(

              {status==='idle'||status==='error'?<button className="btn btn-gsheet" style={{flex:2}} onClick={signIn} disabled={!clientId.trim()}><Ic n="link" s={13}/> Login Google</button>:status==='signing'||status==='syncing'?<button className="btn btn-gsheet" style={{flex:2}} disabled><Spin s={13}/> {status==='signing'?'Login...':'Syncing...'}</button>:<button className="btn btn-gsheet" style={{flex:2}} onClick={doSync}><Ic n="sync" s={13}/> Sync Ulang</button>}
            </div>
            {status==='signed'&&<button className="btn btn-gsheet btn-full" style={{marginTop:8}} onClick={doSync}><Ic n="sync" s={13}/> {spreadsheetId?'Sync ke Sheet Ini':'Buat Spreadsheet & Sync'}</button>}
          </div>
        )}
      </div>
    </div>
  );
};

    setForm({...init, tanggal:tgl, nomorBatch:nextBatchNo()});

    window.scrollTo({top:0,behavior:'smooth'});
  };

  const saveTemplate = () => {
    const name = window.prompt('Nama template ini?', form.namaBarang||'Template Baru');
    if(!name) return;
    const tpl = { id:Date.now(), name, namaBarang:form.namaBarang, hargaPerJam:form.hargaPerJam, hargaPerDus:form.hargaPerDus, jumlahOrang:form.jumlahOrang, tdsPerBox:form.tdsPerBox, daftarPegawai:[...form.daftarPegawai] };
    setTemplates(p=>[tpl,...p.slice(0,9)]);
    toast(`Template "${name}" disimpan!`,'success');
  };
  const loadTemplate = (tpl) => {
    setForm(p=>({...p, namaBarang:tpl.namaBarang, hargaPerJam:tpl.hargaPerJam, hargaPerDus:tpl.hargaPerDus, jumlahOrang:tpl.jumlahOrang, tdsPerBox:tpl.tdsPerBox||'', daftarPegawai:[...tpl.daftarPegawai]}));
    toast(`Template "${tpl.name}" dimuat!`,'info');
  };
  const delTemplate = (id,e) => { e.stopPropagation(); setTemplates(p=>p.filter(t=>t.id!==id)); };

  const onSubmit = e => {
    e.preventDefault(); setLoading(true);
    const finalDus = parseInt(form.jumlahDus) || 0;
    const u = calc(form, finalDus);
    const rec={...form,jumlahDus:String(finalDus),perOrang:u.perOrang,jamPerOrang:u.jamPerOrang,dusPerOrang:u.dusPerOrang,durasi:durasi(form),total:u.total,listPegawai:form.daftarPegawai.map(n=>n.trim()||'Tanpa Nama')};
    if(editItem) {
      setHistory(p=>p.map(x=>x.id===editItem?{...rec,id:editItem}:x));
      setTimeout(()=>{setLoading(false);toast('Batch berhasil diupdate!','success');resetForm(true);},350);
    } else {
      rec.id = Date.now()+Math.random();
      setHistory(p=>[rec,...p]);
      setTimeout(()=>{setLoading(false);setShowSuccess(true);},350);
    }
  };

  const akumulasi = useMemo(()=>{
    const m={};
    history.forEach(x=>(x.listPegawai||[]).forEach(nama=>{
      const k=nama.trim().toUpperCase();
      if(!k||k==='TANPA NAMA') return;
      if(!m[k]) m[k]={nama:k,totalJam:0,totalDus:0,totalSemua:0,batchCount:0};
      m[k].totalJam+=parseFloat(x.jamPerOrang)||0;
      m[k].totalDus+=parseFloat(x.dusPerOrang)||0;
      m[k].totalSemua+=parseFloat(x.perOrang)||0;
      m[k].batchCount+=1;
    }));
    return Object.values(m).sort((a,b)=>b.totalSemua-a.totalSemua);
  },[history]);

  const filtHist = useMemo(()=>{
    let a=[...history];
    if(search.trim()){const q=search.toLowerCase();a=a.filter(x=>x.listPegawai.some(n=>n.toLowerCase().includes(q))||x.namaBarang.toLowerCase().includes(q)||(x.nomorBatch||'').toLowerCase().includes(q));}
    if(filterDate) a=a.filter(x=>x.tanggal===filterDate);
    if(filterBulan) a=a.filter(x=>(x.tanggal||'').slice(0,7)===filterBulan);
    if(sortBy==='terbaru') a.sort((a,b)=>b.id-a.id);
    else if(sortBy==='terlama') a.sort((a,b)=>a.id-b.id);
    else if(sortBy==='tertinggi') a.sort((a,b)=>b.perOrang-a.perOrang);
    else if(sortBy==='terendah') a.sort((a,b)=>a.perOrang-b.perOrang);
    return a;
  },[history,search,filterDate,filterBulan,sortBy]);

  const filtAku = useMemo(()=>{
    if(!search.trim()) return akumulasi;
    const q=search.toLowerCase();
    return akumulasi.filter(p=>p.nama.toLowerCase().includes(q));
  },[akumulasi,search]);

  const stats = useMemo(()=>({
    totalGaji:history.reduce((s,x)=>s+(x.total||0),0),
    totalBatch:history.length,
    totalPegawai:akumulasi.length,
    avgPerOrang:akumulasi.length>0?akumulasi.reduce((s,x)=>s+x.totalSemua,0)/akumulasi.length:0
  }),[history,akumulasi]);

  const maxGaji = akumulasi[0]?.totalSemua||1;

  const chartBulanan = useMemo(()=>{
    const m={};
    history.forEach(x=>{const k=(x.tanggal||'').slice(0,7);if(!k)return;if(!m[k])m[k]=0;m[k]+=Math.floor(x.total||0);});
    return Object.keys(m).sort().slice(-6).map(k=>{const[yr,mo]=k.split('-');return{label:new Date(+yr,+mo-1,1).toLocaleString('id-ID',{month:'short',year:'2-digit'}),val:m[k]};});
  },[history]);

  const chartPegawai = useMemo(()=>akumulasi.slice(0,6).map(p=>({label:p.nama.slice(0,12),val:p.totalSemua})),[akumulasi]);

  const exportExcel = () => {
    if(!window.XLSX){toast('Library XLSX tidak tersedia. Pastikan koneksi internet aktif.','error');return;}
    if(!history||history.length===0){toast('Tidak ada data batch. Simpan batch terlebih dahulu, lalu export.','error');return;}
    const X=window.XLSX,wb=X.utils.book_new(),now=new Date().toLocaleString('id-ID');
    const LOG_H=['Tanggal','Barang','No.Batch','Jam Mulai','Jam Akhir','Durasi','Jml Dus','Jml Box','TDS/Box','Jml Orang','Harga/Jam','Harga/Dus','Upah Jam/Org','Upah Dus/Org','Upah/Orang','Total Batch','Pegawai','Catatan'];
    const mapLog=x=>[x.tanggal,x.namaBarang,x.nomorBatch,x.jamAwal||'-',x.jamAkhir||'-',+(x.durasi||0).toFixed(2),+(x.jumlahDus||0),+(x.jumlahBox||0),+(x.tdsPerBox||0),+(x.jumlahOrang||0),toF(x.hargaPerJam),toF(x.hargaPerDus),+(x.jamPerOrang||0).toFixed(2),+(x.dusPerOrang||0).toFixed(2),+(x.perOrang||0).toFixed(2),+(x.total||0).toFixed(2),(x.listPegawai||[]).join(', '),x.catatan||''];
    const colWidths=[10,22,12,10,10,10,10,10,10,10,12,12,14,14,14,14,40,30].map(w=>({wch:w}));
    const ws1=X.utils.aoa_to_sheet([['LAPORAN UPAH BORONGAN — LOG PRODUKSI'],['Diekspor:',now],[],LOG_H,...history.map(mapLog)]);
    ws1['!cols']=colWidths;
    X.utils.book_append_sheet(wb,ws1,'Log Produksi');
    const ws2=X.utils.aoa_to_sheet([['AKUMULASI PEGAWAI'],['Diekspor:',now],[],['No','Nama','Jml Batch','Total Upah Jam','Total Upah Dus','Total Gaji','Rata-rata/Batch'],...akumulasi.map((p,i)=>[i+1,p.nama,p.batchCount,Math.floor(p.totalJam),Math.floor(p.totalDus),Math.floor(p.totalSemua),Math.floor(p.totalSemua/p.batchCount)])]);
    ws2['!cols']=[5,25,12,16,16,16,18].map(w=>({wch:w}));
    X.utils.book_append_sheet(wb,ws2,'Akumulasi Pegawai');
    const bulanan={};
    history.forEach(x=>{const bln=(x.tanggal||'').slice(0,7);if(!bln)return;if(!bulanan[bln])bulanan[bln]={batch:0,orang:new Set(),dus:0,box:0,jam:0,upahJam:0,upahDus:0,total:0};const b=bulanan[bln];b.batch++;(x.listPegawai||[]).forEach(n=>b.orang.add(n.trim().toUpperCase()));b.dus+=+(x.jumlahDus||0);b.box+=+(x.jumlahBox||0);b.jam+=+(x.durasi||0);b.upahJam+=Math.floor(x.jamPerOrang||0)*(+(x.jumlahOrang||0)||1);b.upahDus+=Math.floor(x.dusPerOrang||0)*(+(x.jumlahOrang||0)||1);b.total+=Math.floor(x.total||0);});
    const blnKeys=Object.keys(bulanan).sort();
    const ws3=X.utils.aoa_to_sheet([['RINGKASAN BULANAN'],['Diekspor:',now],[],['Bulan','Total Batch','Total Pegawai Unik','Total Dus','Total Box','Total Jam Kerja','Total Upah Jam','Total Upah Dus','Total Gaji','Avg Gaji/Orang','Avg Gaji/Batch'],...blnKeys.map(k=>{const b=bulanan[k];const[yr,mo]=k.split('-');const nm=new Date(+yr,+mo-1,1).toLocaleString('id-ID',{month:'long',year:'numeric'});return[nm,b.batch,b.orang.size,b.dus,b.box,+b.jam.toFixed(1),+b.upahJam.toFixed(2),+b.upahDus.toFixed(2),+b.total.toFixed(2),b.orang.size>0?+(b.total/b.orang.size).toFixed(2):0,b.batch>0?+(b.total/b.batch).toFixed(2):0];}),[], ['TOTAL',blnKeys.length+' bulan','','','','',+blnKeys.reduce((s,k)=>s+bulanan[k].upahJam,0).toFixed(2),+blnKeys.reduce((s,k)=>s+bulanan[k].upahDus,0).toFixed(2),+blnKeys.reduce((s,k)=>s+bulanan[k].total,0).toFixed(2),'','']]);
    ws3['!cols']=[22,12,16,10,10,14,16,16,16,16,16].map(w=>({wch:w}));
    X.utils.book_append_sheet(wb,ws3,'Ringkasan Bulanan');
    const det=[['DETAIL PER BULAN'],['Diekspor:',now],[]];
    blnKeys.forEach(k=>{const[yr,mo]=k.split('-');const nm=new Date(+yr,+mo-1,1).toLocaleString('id-ID',{month:'long',year:'numeric'});det.push(['— '+nm.toUpperCase()+' —']);det.push(LOG_H);const bb=history.filter(x=>(x.tanggal||'').slice(0,7)===k).sort((a,b)=>a.tanggal>b.tanggal?1:-1);let sub=0;bb.forEach(x=>{det.push(mapLog(x));sub+=(x.total||0);});det.push(['','','','','','','','','','','','','','','SUBTOTAL '+nm,'','Rp '+sub.toLocaleString('id-ID',{minimumFractionDigits:2,maximumFractionDigits:2})]);det.push([]);});
    const ws4=X.utils.aoa_to_sheet(det);ws4['!cols']=colWidths;X.utils.book_append_sheet(wb,ws4,'Detail per Bulan');
    X.writeFile(wb,`Upah_Borongan_${new Date().toISOString().slice(0,10)}.xlsx`);
    toast('File Excel berhasil diunduh!','success');
  };

  const bulanOptions = useMemo(()=>[...new Set(history.map(x=>(x.tanggal||'').slice(0,7)).filter(Boolean))].sort().reverse(),[history]);
  const activeFilters = (search?1:0)+(filterDate?1:0)+(filterBulan?1:0)+(sortBy!=='terbaru'?1:0);

  const TABS = [
    {id:'input', label:'Input', icon:'input'},
    {id:'log', label:'Log', icon:'list'},
    {id:'pegawai', label:'Pegawai', icon:'users'},
    {id:'katalog', label:'Katalog', icon:'tag'},
    {id:'chart', label:'Grafik', icon:'chart'},
  ];

  return (
    <div className="app">
      {notif&&<Notif msg={notif.msg} type={notif.type} onClose={()=>setNotif(null)}/>}

      {/* SUCCESS MODAL */}
      {showSuccess&&(
        <div className="overlay"><div className="modal">
          <div className="modal-icon success"><Ic n="check" s={32}/></div>
          <h2>Batch Tersimpan!</h2>
          <p>Data upah borongan berhasil dicatat.</p>
          <div className="modal-result">
            <div className="modal-result-lbl">Estimasi Upah Per Orang</div>
            <div className="modal-result-val">{fRp(live.perOrang)}</div>
          </div>
          <div className="modal-btns">
            <button className="btn btn-ghost" style={{flex:1}} onClick={()=>{setShowSuccess(false);setTab('log');}}>Lihat Log</button>
            <button className="btn btn-primary" style={{flex:2}} onClick={()=>{setShowSuccess(false);resetForm(true);}}><Ic n="plus" s={14}/> Batch Baru</button>
          </div>
        </div></div>
      )}

      {confirmDeleteId&&(
        <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)setConfirmDeleteId(null);}}>
          <div className="modal">
            <div className="modal-icon danger"><Ic n="trash" s={28}/></div>
            <h2>Hapus Batch Ini?</h2>
            <p>Batch <strong>{history.find(x=>x.id===confirmDeleteId)?.nomorBatch}</strong> akan dihapus permanen.</p>
            <div className="modal-btns">
              <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setConfirmDeleteId(null)}>Batal</button>
              <button className="btn btn-primary" style={{flex:1,background:'#e11d48'}} onClick={()=>{setHistory(p=>p.filter(x=>x.id!==confirmDeleteId));setConfirmDeleteId(null);toast('Batch dihapus','info');}}>Hapus</button>
            </div>
          </div>
        </div>
      )}

      {showConfirmClear&&(
        <div className="overlay"><div className="modal">
          <div className="modal-icon danger"><Ic n="trash" s={28}/></div>
          <h2>Hapus Semua Data?</h2>
          <p>Seluruh <strong>{history.length} batch</strong> akan dihapus permanen.</p>
          <div className="modal-btns">
            <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setShowConfirmClear(false)}>Batal</button>
            <button className="btn btn-primary" style={{flex:1,background:'#e11d48'}} onClick={()=>{setHistory([]);localStorage.removeItem(KEY);setShowConfirmClear(false);toast('Semua data dihapus','info');}}>Hapus Semua</button>
          </div>
        </div></div>
      )}

      {showGSheet&&<GSheetModal history={history} akumulasi={akumulasi} onClose={()=>setShowGSheet(false)} showNotif={toast}/>}
      {showBackup&&<BackupModal history={history} onImport={rows=>{setHistory(p=>{const ids=new Set(p.map(x=>String(x.id)));const newRows=rows.filter(x=>!ids.has(String(x.id)));return[...p,...newRows];});}} onClose={()=>setShowBackup(false)} toast={toast} initialTab="export"/>}
      {showRestore&&<BackupModal history={history} onImport={rows=>{setHistory(p=>{const ids=new Set(p.map(x=>String(x.id)));const newRows=rows.filter(x=>!ids.has(String(x.id)));return[...p,...newRows];});}} onClose={()=>setShowRestore(false)} toast={toast} initialTab="import"/>}
      {slipGajiPegawai&&<SlipGaji pegawaiNama={slipGajiPegawai} history={history} allBulan={bulanOptions} onClose={()=>setSlipGajiPegawai(null)}/>}

      {/* ════ HEADER ════ */}
      <div className="header">
        <div className="header-dots"/>
        <div className="container header-inner">
          <div className="header-top">
            <div className="brand">
              <div className="brand-icon"><Ic n="calc" s={22}/></div>
              <div>
                <div className="brand-sub">Manajemen Produksi</div>
                <div className="brand-title">Upah Borongan</div>
                <div className="brand-status"><div className="dot-live"/><span>Data tersimpan lokal</span></div>
              </div>
            </div>
            <div className="header-right">
              <div className="header-stats">
                <div className="hstat"><div className="hstat-label">Batch</div><div className="hstat-val" style={{color:'#60a5fa'}}>{stats.totalBatch}</div></div>
                <div className="hstat"><div className="hstat-label">Pegawai</div><div className="hstat-val" style={{color:'#34d399'}}>{stats.totalPegawai}</div></div>
                <div className="hstat"><div className="hstat-label">Total Gaji</div><div className="hstat-val" style={{color:'#fbbf24',fontSize:'.82rem'}}>{fRp(stats.totalGaji)}</div></div>
              </div>
              <div className="header-actions">
                <button className="dm-btn" onClick={()=>setDarkMode(d=>!d)}><Ic n={darkMode?'sun':'moon'} s={13}/>{darkMode?'Light':'Dark'}</button>
                <button className="dm-btn" onClick={()=>setShowBackup(true)}><Ic n="backup" s={13}/>Backup</button>
                <button className="dm-btn" onClick={()=>setShowRestore(true)}><Ic n="ul" s={13}/>Restore</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* ════ TOP NAV BAR ════ */}
      <div className="top-nav">
        <div className="top-nav-inner">
          <div className="tn-search">
            <span className="tn-search-icon"><Ic n="search" s={14}/></span>
            <input className="tn-inp" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Cari pegawai, batch, barang..."/>
            {search&&<button className="tn-clear" onClick={()=>setSearch('')}><Ic n="x" s={13}/></button>}
          </div>
          <div className="tn-div"/>
          <div className="tn-date-wrap">
            <input type="date" value={filterDate} onChange={e=>{setFilterDate(e.target.value);setFilterBulan('');}}/>
            <button className={`tn-pill ${filterDate?'active':''}`}>
              <Ic n="clock" s={12}/>
              {filterDate ? new Date(filterDate+'T00:00:00').toLocaleDateString('id-ID',{day:'numeric',month:'short'}) : 'Tanggal'}
              {filterDate&&<span className="pill-x" onClick={e=>{e.stopPropagation();setFilterDate('');}}>✕</span>}
            </button>
          </div>
          <div style={{position:'relative',flexShrink:0}}>
            <select value={filterBulan} onChange={e=>{setFilterBulan(e.target.value);setFilterDate('');}} className="tn-select" style={{paddingRight:filterBulan?'28px':'10px',color:filterBulan?'var(--brand)':'var(--muted)',borderColor:filterBulan?'var(--brand)':'var(--border)',background:filterBulan?'var(--brand-light)':'var(--surface)'}}>
              <option value="">Semua Bulan</option>

          <div className="tn-div"/>
          <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0}}>
            <span style={{color:'var(--subtle)',flexShrink:0}}><Ic n="sort" s={13}/></span>

              <option value="terbaru">Terbaru</option>
              <option value="terlama">Terlama</option>
              <option value="tertinggi">Upah ↑</option>
              <option value="terendah">Upah ↓</option>
            </select>
          </div>
          <div className="tn-div"/>
          <button className="btn btn-excel btn-sm" style={{flexShrink:0}} onClick={exportExcel}><Ic n="dl" s={12}/> Excel</button>
          <button className="btn btn-gsheet btn-sm" style={{flexShrink:0}} onClick={()=>setShowGSheet(true)}><Ic n="sheet" s={12}/> G.Sheets</button>
        </div>
      </div>

      {/* ════ CONTENT ════ */}
      <div className="container" style={{paddingTop:20}}>

        {/* ═══ BANNER DATA KOSONG ═══ */}
      {history.length===0&&tab!=='grafik'&&tab!=='pegawai'&&tab!=='katalog'&&(
        <div style={{background:'linear-gradient(135deg,#fef3c7,#fffbeb)',border:'1.5px solid #f59e0b',borderRadius:14,padding:'14px 18px',marginBottom:14,display:'flex',alignItems:'center',gap:12}}>
          <span style={{fontSize:'1.4rem'}}>⚠️</span>
          <div style={{flex:1}}>
            <div style={{fontWeight:900,fontSize:'.82rem',color:'#92400e',marginBottom:3}}>Data belum ada — file baru atau belum ada batch tersimpan</div>
            <div style={{fontSize:'.7rem',color:'#b45309'}}>Jika Anda punya backup data dari versi sebelumnya, silakan <strong>Restore</strong> terlebih dahulu. Atau mulai input batch baru di tab Input.</div>
          </div>
          <button className="btn btn-sm" style={{background:'#f59e0b',color:'#fff',fontWeight:900,flexShrink:0}} onClick={()=>setShowRestore(true)}>
            <Ic n="ul" s={12}/> Restore Data
          </button>
        </div>
      )}

      {/* ═══ TAB: INPUT ═══ */}
        {tab==='input'&&(
          <div className="card" style={{marginBottom:16}}>
